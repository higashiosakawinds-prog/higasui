<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楽譜ビューア | 東大阪吹奏楽団</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<style>
:root{
  --blue:#214A9A;--navy:#1C2B4A;--gold:#C8A44D;
  --white:#fff;--bg:#1a1a2e;--muted:#606070;--border:#DDE1EC;
  --red:#C0392B;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:#fff;display:flex;flex-direction:column;}

#stateLoading,#stateError{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);gap:16px;text-align:center;padding:2rem;
}
.spinner{width:44px;height:44px;border:3px solid rgba(200,164,77,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.state-title{font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:700;color:rgba(255,255,255,0.8);}
.state-sub{font-size:0.8rem;color:rgba(255,255,255,0.4);line-height:1.7;}

#viewer-nav{
  height:52px;flex-shrink:0;
  background:rgba(28,43,74,0.98);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(200,164,77,0.2);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1rem;gap:10px;z-index:100;
}
.nav-info{flex:1;min-width:0;}
.nav-score-title{font-family:'Outfit',sans-serif;font-size:0.75rem;font-weight:700;color:rgba(255,255,255,0.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-part-tag{font-family:'Outfit',sans-serif;font-size:0.6rem;font-weight:700;background:rgba(200,164,77,0.2);color:var(--gold);padding:2px 8px;border-radius:10px;margin-left:6px;}
.nav-member{font-size:0.62rem;color:rgba(255,255,255,0.35);margin-top:1px;}
.nav-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.nav-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;border:none;cursor:pointer;font-size:0.75rem;font-weight:700;font-family:inherit;transition:opacity 0.2s;}
.nav-btn-dl{background:var(--gold);color:white;}
.nav-btn-dl:hover{opacity:0.88;}
.nav-btn-dl:disabled{opacity:0.5;cursor:not-allowed;}
.nav-btn-close{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);}
.nav-btn-close:hover{background:rgba(255,255,255,0.15);color:white;}

#page-ctrl{
  height:48px;flex-shrink:0;
  background:rgba(15,15,30,0.9);
  display:flex;align-items:center;justify-content:center;
  gap:12px;border-top:1px solid rgba(255,255,255,0.06);
}
.page-btn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);display:flex;align-items:center;justify-content:center;font-size:0.85rem;transition:all 0.15s;}
.page-btn:hover:not(:disabled){background:rgba(200,164,77,0.3);color:var(--gold);}
.page-btn:disabled{opacity:0.25;cursor:default;}
.page-indicator{font-family:'Outfit',sans-serif;font-size:0.82rem;font-weight:700;color:rgba(255,255,255,0.7);min-width:80px;text-align:center;}

#canvas-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;background:var(--bg);}
#pdf-canvas{max-width:100%;max-height:100%;display:block;box-shadow:0 8px 40px rgba(0,0,0,0.6);}

#swipe-hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);color:rgba(255,255,255,0.4);font-size:0.65rem;padding:5px 12px;border-radius:20px;pointer-events:none;transition:opacity 0.5s;}

#canvas-wrap.flip-next{animation:flipNext 0.18s ease-out;}
#canvas-wrap.flip-prev{animation:flipPrev 0.18s ease-out;}
@keyframes flipNext{0%{opacity:1;transform:translateX(0);}50%{opacity:0;transform:translateX(-24px);}100%{opacity:1;transform:translateX(0);}}
@keyframes flipPrev{0%{opacity:1;transform:translateX(0);}50%{opacity:0;transform:translateX(24px);}100%{opacity:1;transform:translateX(0);}}
</style>
</head>
<body>

<div id="stateLoading">
  <div class="spinner"></div>
  <div class="state-title">楽譜を読み込んでいます…</div>
  <div class="state-sub">しばらくお待ちください</div>
</div>

<div id="stateError" style="display:none;">
  <div style="font-size:2.5rem;">🔒</div>
  <div class="state-title" style="color:#fca5a5;">アクセスできません</div>
  <div class="state-sub" id="errorMsg">URLが無効か、この楽譜へのアクセス権限がありません。</div>
  <a href="./member.html" style="margin-top:12px;color:var(--gold);font-size:0.82rem;">マイページへ戻る</a>
</div>

<div id="viewerMain" style="display:none;flex-direction:column;height:100%;">
  <div id="viewer-nav">
    <div class="nav-info">
      <div>
        <span class="nav-score-title" id="navTitle">—</span>
        <span class="nav-part-tag" id="navPart">—</span>
      </div>
      <div class="nav-member" id="navMember">—</div>
    </div>
    <div class="nav-actions">
      <button class="nav-btn nav-btn-dl" id="dlBtn" onclick="downloadWithWatermark()">
        <i class="fa-solid fa-download"></i> DL
      </button>
      <button class="nav-btn nav-btn-close" onclick="history.back()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="pdf-canvas"></canvas>
    <div id="swipe-hint">← スワイプでページめくり →</div>
  </div>

  <div id="page-ctrl">
    <button class="page-btn" id="prevBtn" onclick="changePage(-1)" disabled>
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <div class="page-indicator" id="pageIndicator">— / —</div>
    <button class="page-btn" id="nextBtn" onclick="changePage(1)" disabled>
      <i class="fa-solid fa-chevron-right"></i>
    </button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://eqnacealnnmpipapdguc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxbmFjZWFsbm5tcGlwYXBkZ3VjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzI4MjgsImV4cCI6MjA4OTQwODgyOH0.XI948sgJf6gWXs-sU9iiqxBXDB_S50ZBz__IeV1hA-0';
const SB_H = { headers:{ 'apikey':SUPABASE_KEY, 'Authorization':`Bearer ${SUPABASE_KEY}` } };

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc      = null;
let currentPage = 1;
let memberData  = null;
let fileData    = null;
let pdfBytes    = null;
let memberPartTags = [];
let touchStartX = 0;
let touchStartY = 0;

// ===================================================
//  初期化
// ===================================================
window.addEventListener('DOMContentLoaded', async () => {
  const params   = new URLSearchParams(location.search);
  const filePath = params.get('path');
  const token    = params.get('token');

  if (!filePath || !token) {
    showError('URLが無効です。マイページのリンクから開いてください。');
    return;
  }

  try {
    // 1. tokenで団員情報取得
    const mRes = await fetch(
      `${SUPABASE_URL}/rest/v1/members?token=eq.${encodeURIComponent(token)}&limit=1`,
      SB_H
    );
    const members = await mRes.json();
    if (!members?.length) { showError('団員情報が確認できません。'); return; }
    memberData = members[0];
    memberPartTags = extractMemberPartTags(memberData);

    // 2. score_filesからファイル情報取得
    const fRes = await fetch(
      `${SUPABASE_URL}/rest/v1/score_files?file_path=eq.${encodeURIComponent(filePath)}&select=*,scores(title)&limit=1`,
      SB_H
    );
    const files = await fRes.json();
    if (!files?.length) { showError('楽譜ファイルが見つかりません。'); return; }
    fileData = files[0];

    // 3. アクセス権限チェック
    const today = new Date().toISOString().split('T')[0];
    const dRes = await fetch(
      `${SUPABASE_URL}/rest/v1/score_distributions?score_id=eq.${fileData.score_id}&or=(valid_until.is.null,valid_until.gte.${today})`,
      SB_H
    );
    const dists = await dRes.json() || [];

    const hasAccess = dists.some(d => {
      if (d.target_type === 'all') return true;
      if (d.target_type === 'members') {
        const memberIds = normalizeTargetMembers(d.target_member_ids);
        if (!memberIds.length) return true;
        return memberIds.includes(String(memberData.id));
      }
      if (d.target_type === 'part') {
        const distPart = String(d.target_part || '').trim().toLowerCase();
        const filePart = String(fileData.part_tag || '').trim().toLowerCase();
        // memberPartTags に distPart が含まれ、かつファイルのパートと一致
        return memberPartTags.includes(distPart) && distPart === filePart;
      }
      if (d.target_type === 'individual' && String(d.target_member_id) === String(memberData.id)) return true;
      return false;
    });

    if (!hasAccess) {
      showError('この楽譜へのアクセス権限がありません。\n蔵書委員会に配布設定を依頼してください。');
      return;
    }

    // 4. ナビバー情報セット
    document.getElementById('navTitle').textContent  = fileData.scores?.title || '楽譜';
    document.getElementById('navPart').textContent   = fileData.part_tag || '';
    document.getElementById('navMember').textContent = `${memberData.name} さん専用`;

    // 5. PDFをStorageからフェッチ
    const pdfRes = await fetch(
      `${SUPABASE_URL}/storage/v1/object/scores/${filePath}`,
      { headers:{ 'apikey':SUPABASE_KEY, 'Authorization':`Bearer ${SUPABASE_KEY}` } }
    );
    if (!pdfRes.ok) throw new Error('PDF fetch failed');
    const arrayBuf = await pdfRes.arrayBuffer();
    pdfBytes = new Uint8Array(arrayBuf);

    // 6. PDF.jsで読み込み
    pdfDoc = await pdfjsLib.getDocument({ data: pdfBytes }).promise;

    // 7. ビューア表示
    showViewer();
    await renderPage(1);

  } catch(e) {
    console.error(e);
    showError('読み込み中にエラーが発生しました。\n時間をおいて再度お試しください。');
  }
});

// ===================================================
//  PDF レンダリング（ハンコ付き）
// ===================================================
async function renderPage(pageNum, direction = null) {
  const page   = await pdfDoc.getPage(pageNum);
  const canvas = document.getElementById('pdf-canvas');
  const ctx    = canvas.getContext('2d');
  const wrap   = document.getElementById('canvas-wrap');

  const viewportRaw = page.getViewport({ scale: 1 });
  const maxW = wrap.clientWidth  * 0.96;
  const maxH = wrap.clientHeight * 0.96;
  const scale = Math.min(maxW / viewportRaw.width, maxH / viewportRaw.height);
  const viewport = page.getViewport({ scale });

  canvas.width  = viewport.width;
  canvas.height = viewport.height;

  await page.render({ canvasContext: ctx, viewport }).promise;
  drawHanko(ctx, canvas.width, canvas.height, memberData?.name || '');

  if (direction) {
    wrap.classList.remove('flip-next','flip-prev');
    void wrap.offsetWidth;
    wrap.classList.add(direction === 'next' ? 'flip-next' : 'flip-prev');
    setTimeout(()=>wrap.classList.remove('flip-next','flip-prev'), 200);
  }

  currentPage = pageNum;
  document.getElementById('pageIndicator').textContent = `${pageNum} / ${pdfDoc.numPages}`;
  document.getElementById('prevBtn').disabled = pageNum <= 1;
  document.getElementById('nextBtn').disabled = pageNum >= pdfDoc.numPages;
}

// ===================================================
//  ハンコ描画
// ===================================================
function drawHanko(ctx, canvasW, canvasH, memberName) {
  const r     = Math.min(canvasW, canvasH) * 0.09;
  const cx    = canvasW - r - canvasW * 0.03;
  const cy    = r + canvasH * 0.02;
  const color = 'rgba(192,57,43,0.75)';

  ctx.save();

  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = color;
  ctx.lineWidth   = r * 0.07;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.88, 0, Math.PI*2);
  ctx.strokeStyle = color;
  ctx.lineWidth   = r * 0.03;
  ctx.stroke();

  ctx.font      = `bold ${r*0.25}px 'Noto Sans JP',sans-serif`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('東大阪吹奏楽団', cx, cy - r * 0.22);

  ctx.beginPath();
  ctx.moveTo(cx - r*0.6, cy);
  ctx.lineTo(cx + r*0.6, cy);
  ctx.strokeStyle = color;
  ctx.lineWidth   = r*0.03;
  ctx.stroke();

  const displayName = fitTextInCircle(ctx, memberName || '', r * 0.27, r * 1.2);
  ctx.font = `bold ${displayName.fontSize}px 'Noto Sans JP',sans-serif`;
  ctx.fillText(displayName.text, cx, cy + r * 0.28);

  ctx.restore();
}

// ===================================================
//  ページめくり
// ===================================================
async function changePage(delta) {
  const next = currentPage + delta;
  if (next < 1 || next > pdfDoc.numPages) return;
  await renderPage(next, delta > 0 ? 'next' : 'prev');
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   changePage(-1);
});

document.getElementById('canvas-wrap')?.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive:true });

document.getElementById('canvas-wrap')?.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    changePage(dx < 0 ? 1 : -1);
    const hint = document.getElementById('swipe-hint');
    if (hint) hint.style.opacity = '0';
  }
}, { passive:true });

// ===================================================
//  ダウンロード（ハンコ焼き付け）
// ===================================================
async function downloadWithWatermark() {
  const btn = document.getElementById('dlBtn');
  btn.innerHTML = '<i class="fa-solid fa-spinner" style="animation:spin .8s linear infinite;"></i> 生成中…';
  btn.disabled = true;

  try {
    const pdfOut = await PDFLib.PDFDocument.create();

    for (let i = 1; i <= pdfDoc.numPages; i++) {
      const page     = await pdfDoc.getPage(i);
      const viewport = page.getViewport({ scale: 2.0 });
      const offscreen = document.createElement('canvas');
      offscreen.width  = viewport.width;
      offscreen.height = viewport.height;
      const octx = offscreen.getContext('2d');
      await page.render({ canvasContext:octx, viewport }).promise;
      drawHanko(octx, offscreen.width, offscreen.height, memberData?.name || '');
      const jpegDataUrl = offscreen.toDataURL('image/jpeg', 0.92);
      const jpgImage = await pdfOut.embedJpg(jpegDataUrl);
      const outPage = pdfOut.addPage([offscreen.width, offscreen.height]);
      outPage.drawImage(jpgImage, { x:0, y:0, width:offscreen.width, height:offscreen.height });
    }

    const scoreTitle = fileData?.scores?.title || '楽譜';
    const partTag    = fileData?.part_tag || '';
    const memberName = memberData?.name || '';
    const pdfBin = await pdfOut.save();
    const blob = new Blob([pdfBin], { type:'application/pdf' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `${sanitizeFilename(scoreTitle)}_${sanitizeFilename(partTag)}_${sanitizeFilename(memberName)}.pdf`;
    a.click();
    URL.revokeObjectURL(url);

  } catch(e) {
    console.error(e);
    alert('ダウンロードに失敗しました。');
  } finally {
    btn.innerHTML = '<i class="fa-solid fa-download"></i> DL';
    btn.disabled = false;
  }
}

// ===================================================
//  状態切り替え
// ===================================================
function showViewer() {
  document.getElementById('stateLoading').style.display = 'none';
  document.getElementById('stateError').style.display   = 'none';
  const main = document.getElementById('viewerMain');
  main.style.display = 'flex';
  setTimeout(()=>{
    const hint = document.getElementById('swipe-hint');
    if(hint) hint.style.opacity = '0';
  }, 3000);
}

function showError(msg) {
  document.getElementById('stateLoading').style.display = 'none';
  document.getElementById('stateError').style.display   = 'flex';
  document.getElementById('errorMsg').textContent       = msg;
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{ if(pdfDoc) renderPage(currentPage); }, 200);
});

// ===================================================
//  ユーティリティ
// ===================================================
function fitTextInCircle(ctx, text, baseSize, maxWidth) {
  const safeText = String(text || '団員');
  let fontSize = baseSize;
  const minSize = baseSize * 0.62;
  do {
    ctx.font = `bold ${fontSize}px 'Noto Sans JP',sans-serif`;
    if (ctx.measureText(safeText).width <= maxWidth || fontSize <= minSize) {
      return { text: safeText, fontSize };
    }
    fontSize -= 1;
  } while (fontSize > minSize);
  return { text: safeText, fontSize: minSize };
}

function normalizeTargetMembers(memberIds) {
  if (!memberIds) return [];
  if (Array.isArray(memberIds)) return memberIds.map(v => String(v));
  if (typeof memberIds === 'string') {
    return memberIds.split(',').map(v => v.trim()).filter(Boolean);
  }
  return [];
}

// ★ ここが修正ポイント：member.part を最初に参照するよう追加
function extractMemberPartTags(member) {
  const candidates = [
    member?.part,       // ← 追加！実際のカラム名
    member?.part_tag,
    member?.part_tags,
    member?.parts,
    member?.instrument,
    member?.instruments,
  ];
  const tags = [];
  candidates.forEach(value => {
    if (!value) return;
    if (Array.isArray(value)) {
      value.forEach(v => tags.push(String(v).trim().toLowerCase()));
      return;
    }
    String(value)
      .split(',')
      .forEach(v => tags.push(v.trim().toLowerCase()));
  });
  return [...new Set(tags.filter(Boolean))];
}

function sanitizeFilename(name) {
  return String(name || '')
    .replace(/[\\/:*?"<>|]/g, '_')
    .replace(/\s+/g, ' ')
    .trim() || '楽譜';
}
</script>
</body>
</html>
