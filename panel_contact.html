<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>連絡網パネル | 東大阪吹奏楽団</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;700&family=Outfit:wght@300;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --blue:#214A9A; --navy:#1C2B4A; --gold:#C8A44D;
  --white:#fff; --bg:#F7F8FA; --text:#1A1A1A;
  --muted:#606070; --border:#DDE1EC;
  --green:#1D9E75; --red:#C0392B;
  --radius:16px; --shadow:0 4px 20px rgba(33,74,154,.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.inner{max-width:900px;margin:0 auto;padding:0 1.25rem;width:100%;}

/* ===== NAV ===== */
#panel-nav{position:sticky;top:0;z-index:100;height:52px;background:var(--navy);border-bottom:1px solid rgba(200,164,77,.25);display:flex;align-items:center;padding:0 1.25rem;gap:12px;}
#back-btn{width:34px;height:34px;border-radius:8px;border:none;background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0;}
#back-btn:hover{background:rgba(255,255,255,.2);}
#panel-title{font-family:'Shippori Mincho',serif;font-size:1rem;font-weight:700;color:#fff;}
#panel-badge{margin-left:auto;padding:3px 12px;border-radius:20px;font-family:'Outfit',sans-serif;font-size:.65rem;font-weight:800;background:rgba(200,164,77,.2);color:var(--gold);letter-spacing:.08em;}

/* ===== ローディング ===== */
#stateLoading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;}
.spinner{width:36px;height:36px;border:3px solid rgba(33,74,154,.12);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#mainContent{display:none;padding:28px 0 80px;}

/* ===== ページヘッダー ===== */
.page-header{background:linear-gradient(160deg,var(--navy) 0%,#0d1b35 100%);position:relative;overflow:hidden;margin-bottom:0;}
.page-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 20%,rgba(200,164,77,.1) 0%,transparent 55%);}
.page-header-inner{position:relative;z-index:1;padding:2rem 1.5rem 2.5rem;max-width:900px;margin:0 auto;}
.page-eyebrow{font-family:'Outfit',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:8px;margin-bottom:.7rem;}
.page-eyebrow::before{content:'';width:14px;height:1.5px;background:var(--gold);}
.page-header h1{font-family:'Shippori Mincho',serif;font-size:clamp(1.4rem,3.5vw,2rem);font-weight:700;color:#fff;line-height:1.3;margin-bottom:.4rem;}
.page-header p{font-size:.82rem;color:rgba(255,255,255,.55);line-height:1.8;}

/* ===== タブ ===== */
.tab-bar{background:var(--navy);border-bottom:2px solid rgba(200,164,77,.2);position:sticky;top:52px;z-index:90;overflow-x:auto;}
.tab-bar-inner{display:flex;max-width:900px;margin:0 auto;padding:0 1.25rem;min-width:max-content;}
.tab-btn{padding:.8rem 1.1rem;border:none;background:none;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:700;color:rgba(255,255,255,.5);border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap;margin-bottom:-2px;}
.tab-btn:hover{color:rgba(255,255,255,.85);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-pane{display:none;padding:28px 0 80px;}
.tab-pane.active{display:block;}

/* ===== セクション ===== */
.sec{margin-bottom:32px;}
.sec-label{font-family:'Outfit',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.sec-label::before{content:'';width:14px;height:1.5px;background:var(--gold);}

/* ===== ボタン共通 ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:700;transition:opacity .2s,transform .15s;}
.btn:hover{opacity:.88;transform:translateY(-1px);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-blue{background:var(--blue);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn-danger{background:rgba(192,57,43,.1);color:var(--red);border:1.5px solid rgba(192,57,43,.2);}
.btn-green{background:var(--green);color:#fff;}
.btn-sm{padding:6px 12px;font-size:.75rem;}

/* ===== フォームパーツ ===== */
.form-group{margin-bottom:1rem;}
.form-label{display:block;font-size:.78rem;font-weight:700;color:var(--navy);margin-bottom:.4rem;}
.form-required{color:var(--red);margin-left:3px;}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:.88rem;color:var(--text);background:var(--white);outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--blue);}
.form-select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:.88rem;color:var(--text);background:var(--white);outline:none;transition:border-color .2s;cursor:pointer;}
.form-select:focus{border-color:var(--blue);}
.form-textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:.88rem;color:var(--text);background:var(--white);outline:none;transition:border-color .2s;resize:vertical;min-height:160px;line-height:1.7;}
.form-textarea:focus{border-color:var(--blue);}
.form-hint{font-size:.72rem;color:var(--muted);margin-top:.3rem;line-height:1.6;}
.char-count{font-size:.72rem;color:var(--muted);text-align:right;margin-top:.2rem;}
.char-count.warn{color:var(--red);}

/* ===== 送信フォームカード ===== */
.compose-card{background:var(--white);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:var(--shadow);}
.compose-head{background:linear-gradient(135deg,var(--navy),var(--blue));padding:1.1rem 1.4rem;display:flex;align-items:center;gap:10px;}
.compose-head-title{font-family:'Shippori Mincho',serif;font-size:.95rem;font-weight:700;color:#fff;}
.compose-body{padding:1.4rem;}
.compose-footer{padding:1rem 1.4rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;}

/* ===== 送信先プレビューバッジ ===== */
.preview-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:700;border:1.5px solid var(--border);color:var(--muted);transition:all .2s;background:var(--bg);}
.preview-badge.has-targets{background:rgba(33,74,154,.06);border-color:var(--blue);color:var(--blue);}
.preview-badge i{font-size:.8rem;}

/* ===== 個人指定チェックリスト ===== */
#individualWrap{display:none;margin-top:.8rem;}
.member-check-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;padding:10px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);}
.member-check-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:background .15s;}
.member-check-item:hover{background:rgba(33,74,154,.05);}
.member-check-item input{accent-color:var(--blue);width:14px;height:14px;}
.member-check-item label{font-size:.82rem;cursor:pointer;flex:1;}

/* ===== 履歴テーブル ===== */
.history-table-wrap{background:var(--white);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:var(--shadow);}
.history-table-head{padding:1rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.history-table-head-title{font-family:'Shippori Mincho',serif;font-size:.95rem;font-weight:700;color:var(--navy);}
table.history-table{width:100%;border-collapse:collapse;}
table.history-table th{padding:.7rem 1rem;font-size:.72rem;font-weight:700;font-family:'Outfit',sans-serif;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
table.history-table td{padding:.85rem 1rem;font-size:.82rem;border-bottom:1px solid var(--border);vertical-align:top;}
table.history-table tr:last-child td{border-bottom:none;}
table.history-table tr:hover td{background:rgba(33,74,154,.02);}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700;font-family:'Outfit',sans-serif;letter-spacing:.05em;white-space:nowrap;}
.badge-sent{background:rgba(29,158,117,.1);color:var(--green);}
.badge-draft{background:rgba(200,164,77,.15);color:#9A7020;}
.badge-pending{background:rgba(200,164,77,.15);color:#9A7020;}
.badge-accepted{background:rgba(29,158,117,.1);color:var(--green);}
.badge-rejected{background:rgba(192,57,43,.1);color:var(--red);}
.target-label{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.72rem;font-weight:700;background:rgba(33,74,154,.08);color:var(--blue);}
.history-empty{padding:2.5rem;text-align:center;color:var(--muted);font-size:.85rem;}

/* ===== 見学申込カード ===== */
.visit-card{background:var(--white);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px;}
.visit-card-head{padding:1rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.visit-card-name{font-family:'Shippori Mincho',serif;font-size:1rem;font-weight:700;color:var(--navy);}
.visit-card-yomi{font-size:.72rem;color:var(--muted);margin-top:2px;}
.visit-card-body{padding:1rem 1.2rem;display:grid;grid-template-columns:1fr 1fr;gap:.6rem 1.2rem;}
@media(max-width:480px){.visit-card-body{grid-template-columns:1fr;}}
.visit-info-item{font-size:.8rem;}
.visit-info-label{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;font-family:'Outfit',sans-serif;letter-spacing:.06em;margin-bottom:2px;}
.visit-info-value{color:var(--text);line-height:1.5;}
.visit-card-footer{padding:.8rem 1.2rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.visit-note{background:var(--bg);border-radius:10px;padding:.8rem 1rem;font-size:.8rem;color:var(--text);line-height:1.7;grid-column:1/-1;white-space:pre-wrap;word-break:break-all;}
.visit-count-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.visit-count-info{font-size:.82rem;color:var(--muted);}
.visit-count-info strong{color:var(--navy);font-family:'Outfit',sans-serif;}

/* ===== モーダル ===== */
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:none;align-items:flex-start;justify-content:center;padding:1.5rem;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:20px;width:100%;max-width:520px;margin:auto;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-head{background:linear-gradient(135deg,var(--navy),var(--blue));padding:1.1rem 1.4rem;display:flex;align-items:center;justify-content:space-between;}
.modal-head-title{font-family:'Shippori Mincho',serif;font-size:1rem;font-weight:700;color:#fff;}
.modal-close{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:1.1rem;transition:color .2s;padding:4px;}
.modal-close:hover{color:#fff;}
.modal-body{padding:1.4rem;}
.modal-footer{padding:1rem 1.4rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}

/* ===== プレビューモーダル本文 ===== */
.preview-subject{font-family:'Shippori Mincho',serif;font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:.8rem;}
.preview-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;}
.preview-body{background:var(--bg);border-radius:10px;padding:1rem;font-size:.85rem;line-height:1.9;white-space:pre-wrap;word-break:break-all;max-height:240px;overflow-y:auto;}
.preview-warn{font-size:.75rem;color:var(--red);margin-top:.8rem;}

/* ===== Toast ===== */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:.8rem 1.4rem;border-radius:12px;font-size:.82rem;font-weight:700;z-index:9999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ===== レスポンシブ ===== */
@media(max-width:600px){
  table.history-table th:nth-child(4),
  table.history-table td:nth-child(4){display:none;}
  .compose-footer{flex-direction:column;}
  .compose-footer .btn{width:100%;justify-content:center;}
}
</style>
</head>
<body>

<!-- NAV -->
<nav id="panel-nav" style="display:none;">
  <button id="back-btn" onclick="goBack()" title="戻る"><i class="fas fa-chevron-left"></i></button>
  <div id="panel-title">連絡網</div>
  <div id="panel-badge">CONTACT</div>
</nav>

<!-- ローディング -->
<div id="stateLoading">
  <div class="spinner"></div>
  <p style="font-size:.82rem;color:var(--muted);">読み込んでいます…</p>
</div>

<!-- メインコンテンツ -->
<div id="mainContent">
  <div class="page-header">
    <div class="page-header-inner">
      <div class="page-eyebrow">Contact Panel</div>
      <h1>📨 連絡網パネル</h1>
      <p>団員・保護者・関係者へのメール一斉送信、送信履歴、見学申込の確認ができます。</p>
    </div>
  </div>

  <!-- タブバー -->
  <div class="tab-bar">
    <div class="tab-bar-inner">
      <button class="tab-btn active" onclick="switchTab('mail')" id="tab-mail">
        <i class="fas fa-envelope"></i> メール送信
      </button>
      <button class="tab-btn" onclick="switchTab('visit')" id="tab-visit">
        <i class="fas fa-user-check"></i> 見学申込
        <span id="visitBadge" style="display:none;background:var(--red);color:#fff;border-radius:20px;font-size:.62rem;padding:1px 7px;font-family:'Outfit',sans-serif;font-weight:800;"></span>
      </button>
    </div>
  </div>

  <!-- ===== タブ1：メール送信 ===== -->
  <div id="pane-mail" class="tab-pane active">
    <div class="inner">

      <!-- 新規作成フォーム -->
      <div class="sec">
        <div class="sec-label">新規メール作成</div>
        <div class="compose-card">
          <div class="compose-head">
            <i class="fas fa-envelope" style="color:#fff;font-size:1rem;"></i>
            <div class="compose-head-title">メール作成</div>
          </div>
          <div class="compose-body">

            <div class="form-group">
              <label class="form-label">送信先<span class="form-required">*</span></label>
              <select id="targetType" class="form-select" onchange="onTargetTypeChange()">
                <option value="">送信先を選択してください</option>
                <option value="all">全員（団員＋保護者＋関係者）</option>
                <option value="members">団員のみ</option>
                <option value="part">パートメンバー</option>
                <option value="guardians">保護者のみ</option>
                <option value="school">学校関係者のみ</option>
                <option value="individual">個人指定</option>
              </select>
            </div>

            <div id="partWrap" style="display:none;" class="form-group">
              <label class="form-label">パートを選択<span class="form-required">*</span></label>
              <select id="targetPart" class="form-select">
                <option value="">パートを選択</option>
                <option value="flute">フルート</option>
                <option value="oboe">オーボエ</option>
                <option value="clarinet">クラリネット</option>
                <option value="bassoon">ファゴット</option>
                <option value="saxophone">サックス</option>
                <option value="horn">ホルン</option>
                <option value="trumpet">トランペット</option>
                <option value="trombone">トロンボーン</option>
                <option value="euphonium">ユーフォニアム</option>
                <option value="tuba">チューバ</option>
                <option value="percussion">パーカッション</option>
                <option value="contrabass">コントラバス</option>
              </select>
            </div>

            <div id="individualWrap">
              <label class="form-label">団員を選択<span class="form-required">*</span></label>
              <div id="memberCheckList" class="member-check-list">
                <p style="font-size:.8rem;color:var(--muted);padding:.3rem;">読み込み中…</p>
              </div>
            </div>

            <div id="previewBadgeWrap" style="margin-bottom:1rem;display:none;">
              <span class="preview-badge has-targets" id="previewBadge">
                <i class="fas fa-users"></i>
                <span id="previewBadgeText">—</span>
              </span>
            </div>

            <div class="form-group">
              <label class="form-label">件名<span class="form-required">*</span></label>
              <input id="subject" class="form-input" type="text" placeholder="例：2026年4月 練習スケジュールのご連絡">
            </div>

            <div class="form-group">
              <label class="form-label">本文<span class="form-required">*</span></label>
              <textarea id="body" class="form-textarea"
                placeholder="本文を入力してください…"
                oninput="updateBodyCount()"></textarea>
              <div class="char-count" id="bodyCount">0文字</div>
            </div>

          </div>
          <div class="compose-footer">
            <button class="btn btn-outline" onclick="saveDraft()">
              <i class="fas fa-save"></i> 下書き保存
            </button>
            <button class="btn btn-gold" onclick="openPreviewModal()">
              <i class="fas fa-paper-plane"></i> 確認して送信
            </button>
          </div>
        </div>
      </div>

      <!-- 送信済み・下書き履歴 -->
      <div class="sec">
        <div class="sec-label">送信履歴・下書き</div>
        <div class="history-table-wrap">
          <div class="history-table-head">
            <div class="history-table-head-title">メール一覧</div>
            <button class="btn btn-outline btn-sm" onclick="loadHistory()">
              <i class="fas fa-sync-alt"></i> 更新
            </button>
          </div>
          <div id="historyBody">
            <div class="history-empty"><div class="spinner" style="margin:0 auto 10px;"></div>読み込み中…</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ===== タブ2：見学申込 ===== -->
  <div id="pane-visit" class="tab-pane">
    <div class="inner">
      <div class="sec">
        <div class="visit-count-bar">
          <div class="sec-label" style="margin-bottom:0;">見学申込一覧</div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <select id="visitFilter" class="form-select" style="width:auto;font-size:.78rem;padding:6px 12px;" onchange="loadVisitApplications()">
              <option value="pending">未対応のみ</option>
              <option value="all">すべて表示</option>
              <option value="accepted">対応済み</option>
            </select>
            <button class="btn btn-outline btn-sm" onclick="loadVisitApplications()">
              <i class="fas fa-sync-alt"></i> 更新
            </button>
          </div>
        </div>
        <div class="visit-count-info" id="visitCountInfo" style="margin-bottom:16px;"></div>
        <div id="visitList">
          <div class="history-empty"><div class="spinner" style="margin:0 auto 10px;"></div>読み込み中…</div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /mainContent -->

<!-- 送信確認モーダル -->
<div id="previewModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-title">📤 送信確認</div>
      <button class="modal-close" onclick="closeModal('previewModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <p style="font-size:.82rem;color:var(--muted);margin-bottom:1rem;">以下の内容でメールを送信します。内容をよく確認してください。</p>
      <div class="preview-subject" id="previewSubject"></div>
      <div class="preview-meta" id="previewMeta"></div>
      <div class="preview-body" id="previewBodyText"></div>
      <p class="preview-warn">⚠️ 送信後は取り消せません。</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('previewModal')">キャンセル</button>
      <button class="btn btn-blue" id="sendBtn" onclick="sendMail()">
        <i class="fas fa-paper-plane"></i> 送信する
      </button>
    </div>
  </div>
</div>

<!-- 下書き読み込みモーダル -->

<script>

const SUPABASE_URL      = 'https://eqnacealnnmpipapdguc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxbmFjZWFsbm5tcGlwYXBkZ3VjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzI4MjgsImV4cCI6MjA4OTQwODgyOH0.XI948sgJf6gWXs-sU9iiqxBXDB_S50ZBz__IeV1hA-0';

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function makeSB(token) {

    headers: {

let allMembers   = [];
let currentDraftId = null;
let currentVisitId = null;

// =============================================

window.addEventListener('DOMContentLoaded', async () => {

function switchTab(name) {

async function loadMembers() {

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/members?select=id,name,email,part,role&order=name.asc`, SB
    );

    renderMemberCheckList();
  } catch(e) { console.error('団員読み込み失敗:', e); }
}

function renderMemberCheckList() {

  if (!allMembers.length) {
    wrap.innerHTML = '<p style="font-size:.8rem;color:var(--muted);padding:.3rem;">団員データがありません</p>';

  }
  wrap.innerHTML = allMembers.map(m =>
    `<div class="member-check-item">
      <input type="checkbox" id="mc_${esc(m.id)}" value="${esc(m.id)}" onchange="updatePreviewBadge()">
      <label for="mc_${esc(m.id)}">${esc(m.name)} <span style="color:var(--muted);font-size:.72rem;">${esc(m.part || '')}</span></label>

}

// =============================================
//  送信先変更ハンドラ
// =============================================
function onTargetTypeChange() {
  const val = document.getElementById('targetType').value;
  document.getElementById('partWrap').style.display       = val === 'part'       ? 'block' : 'none';
  document.getElementById('individualWrap').style.display = val === 'individual' ? 'block' : 'none';
  updatePreviewBadge();
}

async function updatePreviewBadge() {
  const targetType = document.getElementById('targetType').value;
  const wrap = document.getElementById('previewBadgeWrap');
  if (!targetType) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  const count = await countTargets(targetType);
  const labels = { all:'全員', members:'団員のみ', part:'パートメンバー', guardians:'保護者のみ', school:'学校関係者', individual:'個人指定' };
  document.getElementById('previewBadgeText').textContent = `${labels[targetType] || targetType}：${count}名に送信`;
}

async function countTargets(targetType) {
  try {
    let url = `${SUPABASE_URL}/rest/v1/members?select=id`;
    if (targetType === 'members') {
      url += `&role=in.(president,vice_president,conductor,director,committee,member)`;
    } else if (targetType === 'part') {
      const part = document.getElementById('targetPart').value;
      if (!part) return 0;
      url += `&part=eq.${encodeURIComponent(part)}`;
    } else if (targetType === 'guardians') {
      url += `&role=eq.guardian`;
    } else if (targetType === 'school') {
      url += `&role=eq.instructor`;
    } else if (targetType === 'individual') {
      return getCheckedMemberIds().length;
    }
    const res = await fetch(url, { ...SB, headers: { ...SB.headers, 'Prefer': 'count=exact', 'Range': '0-0' } });
    const countHeader = res.headers.get('Content-Range');
    if (countHeader) return parseInt(countHeader.split('/')[1]) || 0;
    const data = await res.json();
    return Array.isArray(data) ? data.length : 0;
  } catch(e) { return 0; }
}

function getCheckedMemberIds() {
  return Array.from(document.querySelectorAll('#memberCheckList input:checked')).map(el => el.value);
}

// =============================================
//  文字数カウント
// =============================================
function updateBodyCount() {
  const len = document.getElementById('body').value.length;
  const el  = document.getElementById('bodyCount');
  el.textContent = `${len}文字`;
  el.className   = 'char-count' + (len > 2000 ? ' warn' : '');
}

// =============================================
//  フォームバリデーション
// =============================================
function validateForm() {
  const targetType = document.getElementById('targetType').value;
  const subject    = document.getElementById('subject').value.trim();
  const body       = document.getElementById('body').value.trim();
  if (!targetType)  { showToast('⚠️ 送信先を選択してください'); return false; }
  if (targetType === 'part' && !document.getElementById('targetPart').value) {
    showToast('⚠️ パートを選択してください'); return false;
  }
  if (targetType === 'individual' && getCheckedMemberIds().length === 0) {
    showToast('⚠️ 送信する団員を選択してください'); return false;
  }
  if (!subject) { showToast('⚠️ 件名を入力してください'); return false; }
  if (!body)    { showToast('⚠️ 本文を入力してください'); return false; }
  return true;
}

// =============================================
//  下書き保存
// =============================================
async function saveDraft() {
  if (!validateForm()) return;
  const payload = buildPayload('draft');
  try {
    let res;
    if (currentDraftId) {
      res = await fetch(`${SUPABASE_URL}/rest/v1/messages?id=eq.${currentDraftId}`, {
        method: 'PATCH',
        headers: { ...SB.headers, 'Prefer': 'return=representation' },
        body: JSON.stringify(payload),
      });
    } else {
      res = await fetch(`${SUPABASE_URL}/rest/v1/messages`, {
        method: 'POST',
        headers: { ...SB.headers, 'Prefer': 'return=representation' },
        body: JSON.stringify(payload),
      });
    }
    const data = await res.json();
    if (data && data[0]) currentDraftId = data[0].id;
    showToast('💾 下書きを保存しました');
    await loadHistory();
  } catch(e) {
    showToast('⚠️ 保存に失敗しました');
    console.error(e);
  }
}

//  送信確認モーダル
// =============================================
async function openPreviewModal() {
  if (!validateForm()) return;
  const targetType = document.getElementById('targetType').value;
  const subject    = document.getElementById('subject').value.trim();
  const body       = document.getElementById('body').value.trim();
  const count = await countTargets(targetType);
  const labels = { all:'全員', members:'団員のみ', part:'パートメンバー', guardians:'保護者のみ', school:'学校関係者のみ', individual:'個人指定' };

  document.getElementById('previewSubject').textContent = subject;

}

// =============================================
//  送信
// =============================================
async function sendMail() {
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 送信中…';
  const payload = buildPayload('sent');
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/messages`, {
      method: 'POST',
      headers: { ...SB.headers, 'Prefer': 'return=representation' },
      body: JSON.stringify({ ...payload, sent_at: new Date().toISOString() }),
    });
    if (!res.ok) throw new Error();
    closeModal('previewModal');
    clearForm();
    showToast('✅ 送信しました（messagesに記録）');
    await loadHistory();
  } catch(e) {
    showToast('⚠️ 送信に失敗しました');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> 送信する';
  }
}

function buildPayload(status) {
  const targetType = document.getElementById('targetType').value;
  const targetPart = document.getElementById('targetPart').value;
  return {
    status,
    target_type:    targetType,
    target_part:    targetType === 'part' ? targetPart : null,
    target_members: targetType === 'individual' ? getCheckedMemberIds() : null,
    subject:        document.getElementById('subject').value.trim(),
    body:           document.getElementById('body').value.trim(),
  };
}

  try {
    const res  = await fetch(`${SUPABASE_URL}/rest/v1/messages?id=eq.${currentDraftId}&limit=1`, SB);

  try {
    let url = `${SUPABASE_URL}/rest/v1/applications?member_type=eq.見学&order=created_at.desc&limit=100`;
    if (filter === 'pending')  url += '&status=eq.pending';
    if (filter === 'accepted') url += '&status=in.(accepted,rejected)';

    const res  = await fetch(url, SB);
    const data = await res.json();

    // バッジ更新（未対応件数）
    const pendingCount = data.filter(d => d.status === 'pending').length;
    const badge = document.getElementById('visitBadge');
    if (pendingCount > 0) {
      badge.textContent = pendingCount;
      badge.style.display = 'inline';
    } else {
      badge.style.display = 'none';
    }

    document.getElementById('visitCountInfo').innerHTML =
      `全 <strong>${data.length}</strong> 件${pendingCount > 0 ? `（うち未対応 <strong style="color:var(--red);">${pendingCount}</strong> 件）` : ''}`;

    if (!data.length) {
      wrap.innerHTML = '<div class="history-empty">見学申込はありません</div>';
      return;
    }

    const partLabels = {
      flute:'フルート', oboe:'オーボエ', clarinet:'クラリネット', bassoon:'ファゴット',
      saxophone:'サックス', horn:'ホルン', trumpet:'トランペット', trombone:'トロンボーン',
      euphonium:'ユーフォニアム', tuba:'チューバ', percussion:'パーカッション', contrabass:'コントラバス',
    };

    wrap.innerHTML = data.map(a => {
      const statusBadge = a.status === 'pending'
        ? '<span class="badge badge-pending">⏳ 未対応</span>'
        : a.status === 'accepted'
          ? '<span class="badge badge-accepted">✅ 対応済み</span>'
          : '<span class="badge badge-rejected">❌ お断り</span>';

      return `
        <div class="visit-card">
          <div class="visit-card-head">
            <div>
              <div class="visit-card-name">${esc(a.name)}</div>
              <div class="visit-card-yomi">${esc(a.yomi || '')}</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
              ${statusBadge}
            </div>
          </div>
          <div class="visit-card-body">
            <div class="visit-info-item">
              <div class="visit-info-label">メール</div>
              <div class="visit-info-value"><a href="mailto:${esc(a.email)}" style="color:var(--blue);">${esc(a.email)}</a></div>
            </div>
            <div class="visit-info-item">
              <div class="visit-info-label">電話</div>
              <div class="visit-info-value">${esc(a.phone || '—')}</div>
            </div>
            <div class="visit-info-item">
              <div class="visit-info-label">希望パート</div>
              <div class="visit-info-value">${esc(partLabels[a.part] || a.part || '未選択')}</div>
            </div>
            <div class="visit-info-item">
              <div class="visit-info-label">生年月日</div>
              <div class="visit-info-value">${esc(a.birthday || '—')}</div>
            </div>
            <div class="visit-info-item">
              <div class="visit-info-label">申込日時</div>
              <div class="visit-info-value">${fmtDate(a.created_at)}</div>
            </div>
            ${a.guardian_name ? `
            <div class="visit-info-item">
              <div class="visit-info-label">保護者氏名</div>
              <div class="visit-info-value">${esc(a.guardian_name)}</div>
            </div>
            <div class="visit-info-item">
              <div class="visit-info-label">保護者連絡先</div>
              <div class="visit-info-value">${esc(a.emergency_phone || '—')}</div>
            </div>
            ` : ''}
            ${a.comment ? `
            <div class="visit-info-item" style="grid-column:1/-1;">
              <div class="visit-info-label">希望日程・コメント</div>
              <div class="visit-note">${esc(a.comment)}</div>
            </div>

          </div>
          <div class="visit-card-footer">
            ${a.status === 'pending' ? `
              <button class="btn btn-green btn-sm" onclick="updateVisitStatus('${esc(a.id)}','accepted')">
                <i class="fas fa-check"></i> 対応済みにする
              </button>
              <button class="btn btn-danger btn-sm" onclick="updateVisitStatus('${esc(a.id)}','rejected')">
                <i class="fas fa-times"></i> お断り
              </button>
            ` : `
              <button class="btn btn-outline btn-sm" onclick="updateVisitStatus('${esc(a.id)}','pending')">
                <i class="fas fa-undo"></i> 未対応に戻す
              </button>
            `}

              <i class="fas fa-envelope"></i> メールを送る
            </a>

        </div>

  } catch(e) {

// =============================================
//  見学申込 ステータス更新
// =============================================
async function updateVisitStatus(id, status) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/applications?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...SB.headers, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status }),
    });
    if (!res.ok) throw new Error();
    const labels = { accepted:'✅ 対応済みにしました', rejected:'❌ お断りにしました', pending:'↩️ 未対応に戻しました' };
    showToast(labels[status] || '更新しました');
    await loadVisitApplications();
  } catch(e) {
    showToast('⚠️ 更新に失敗しました');
    console.error(e);
  }
}

// =============================================
//  ユーティリティ
// =============================================
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function goBack() { location.href = './member.html'; }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});
</script>
