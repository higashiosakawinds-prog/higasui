<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東大阪吹奏楽団 | 一緒に奏でよう東大阪の音</title>
<meta name="description" content="東大阪市の地域吹奏楽団。ブランク歓迎・年齢不問・毎週土曜練習。楽器をもう一度吹きませんか？見学¥500〜">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Shippori+Mincho:wght@400;700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#214A9A; --navy:#1C2B4A; --gold:#C8A44D; --goldhv:#D9B85E;
  --white:#fff; --bg:#F7F8FA; --text:#1A1A1A; --muted:#606070; --border:#DDE1EC;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}

/* NAV */
#site-nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  height:56px;background:rgba(28,43,74,0.97);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(200,164,77,0.25);
  display:flex;align-items:center;justify-content:space-between;padding:0 1.2rem;
}
#nav-logo{display:flex;align-items:center;text-decoration:none;}
#nav-logo img{height:32px;width:auto;filter:brightness(0) invert(1);}
#ham-btn{
  width:44px;height:44px;border:none;background:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  padding:0;flex-shrink:0;z-index:1001;position:relative;
}
#ham-btn span{display:block;width:22px;height:2px;background:white;border-radius:2px;transition:all 0.3s;}

#site-drawer{
  display:none;
  position:fixed;top:56px;left:0;right:0;bottom:0;
  z-index:999;
  background:var(--navy);
  overflow-y:auto;
  padding:1.5rem 1.5rem 3rem;
}
#site-drawer.open{display:block;}
#site-drawer ul{list-style:none;}
#site-drawer ul li a{
  display:flex;align-items:center;gap:0.8rem;
  padding:1rem 0;border-bottom:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.85);text-decoration:none;font-size:1rem;font-weight:500;
}

/* HERO - PCでもスマホでもレイアウト固定 */
.hero {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  padding-top: 56px;
  background: var(--navy);
  display: block;
}

.hero-photo-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 4 / 3;
  overflow: hidden;
  line-height: 0;
}

.hero-photo-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ロゴのサイズとドロップシャドウ */
.hero-logo-over {
  position: absolute;
  top: 10%;
  left: 5%;
  width: 65%;
  max-width: 250px;
  z-index: 2;
  filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.9));
}

.hero-logo-over img {
  width: 100%;
  height: auto;
}

.hero-body {
  padding: 2.5rem 1.5rem 3.5rem;
  background: var(--navy);
  text-align: center;
}

.hero-h1 {
  font-family: 'Shippori Mincho', serif;
  font-size: clamp(1.8rem, 8vw, 2.6rem);
  font-weight: 700;
  color: white;
  line-height: 1.4;
  margin-bottom: 1rem;
}

.hero-en {
  font-family: 'Outfit', sans-serif;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.7);
  margin-bottom: 1.5rem;
  letter-spacing: 0.2em;
}

.hero-desc {
  font-size: 0.95rem;
  color: white;
  line-height: 1.8;
  margin-bottom: 2.5rem;
}

.hero-desc strong {
  color: #FFE585;
}

/* BUTTONS */
.hero-btns {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-width: 320px;
  margin: 0 auto;
}
.btn-gold, .btn-ghost {
  display: block;
  padding: 18px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: 700;
  font-size: 0.95rem;
  transition: all 0.3s;
  text-align: center;
}
.btn-gold {
  background: var(--gold);
  color: white;
  box-shadow: 0 4px 15px rgba(200,164,77,0.3);
}
.btn-ghost {
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
}

/* BANNER - 中央寄せ */
.banner-wrap {
  background: #000;
  display: flex;
  justify-content: center;
  width: 100%;
}
.banner-wrap img {
  max-width: 960px;
  width: 100%;
  height: auto;
  display: block;
}

/* SECTION COMMON */
section { padding: 4rem 1.2rem; }
.section-title {
  text-align: center; margin-bottom: 2.5rem;
}
.section-title h2 {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.8rem; color: var(--navy); margin-bottom: 0.5rem;
}
</style>
</head>
<body>

<nav id="site-nav">
  <a href="#" id="nav-logo">
    <img src="/higasui/higasui.svg" alt="東大阪吹奏楽団">
  </a>
  <button id="ham-btn" aria-label="メニュー">
    <span></span><span></span><span></span>
  </button>
</nav>

<div id="site-drawer">
  <ul>
    <li><a href="#about">団について</a></li>
    <li><a href="#concert">演奏会情報</a></li>
    <li><a href="#join">見学・入団</a></li>
  </ul>
</div>

<section class="hero">
  <div class="hero-photo-wrap">
    <img src="/higasui/trumpet_girl.jpg" alt="演奏する女性">
    <div class="hero-logo-over">
      <img src="/higasui/higasui.svg" alt="東大阪吹奏楽団ロゴ">
    </div>
  </div>

  <div class="hero-body">
    <h1 class="hero-h1">久しぶりに<br>楽器、吹きませんか？</h1>
    <p class="hero-en">Higashi Osaka Wind Orchestra</p>
    <p class="hero-desc"><strong>ブランク何年でも大歓迎。</strong><br>東大阪に、大人も子供も一緒に音楽を楽しめる場所を作りたい。毎週土曜日は一緒に奏でましょう！</p>
    <div class="hero-btns">
      <a href="#join" class="btn-gold">🎺 見学・体験を申し込む（¥500〜）</a>
      <a href="#about" class="btn-ghost">団について詳しく見る</a>
    </div>
  </div>
</section>

<div class="banner-wrap">
  <img src="/higasui/concert_banner.jpg" alt="演奏会バナー">
</div>

<script>
const ham = document.getElementById('ham-btn');
const drawer = document.getElementById('site-drawer');
ham.addEventListener('click', () => {
  drawer.classList.toggle('open');
});
</script>

</body>
</html>
