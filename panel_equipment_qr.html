<title>QRコード印刷 | 楽器管理委員会</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Shippori+Mincho:wght@400;700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --blue:#214A9A;--navy:#1C2B4A;--gold:#C8A44D;
  --white:#fff;--bg:#F7F8FA;--text:#1A1A1A;--muted:#606070;--border:#DDE1EC;
  --green:#1D9E75;--red:#C0392B;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;}

/* ===== NAV ===== */
#site-nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;height:56px;
  background:rgba(28,43,74,0.97);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(200,164,77,0.25);display:none;
}
.nav-inner{height:100%;display:flex;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto;padding:0 1.5rem;}
#nav-logo{font-family:'Shippori Mincho',serif;color:#fff;font-size:1rem;font-weight:700;text-decoration:none;}
#nav-logo small{display:block;font-family:'Outfit',sans-serif;font-size:0.55rem;color:rgba(255,255,255,0.35);letter-spacing:.14em;font-weight:400;}
.nav-badge{font-family:'Outfit',sans-serif;font-size:0.58rem;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;background:rgba(200,164,77,0.15);color:var(--gold);padding:4px 10px;border-radius:20px;border:1px solid rgba(200,164,77,0.3);}
.nav-back{background:none;border:none;cursor:pointer;font-size:0.75rem;color:rgba(255,255,255,0.4);font-family:inherit;padding:6px 10px;border-radius:8px;transition:color 0.2s;text-decoration:none;}
.nav-back:hover{color:rgba(255,255,255,0.8);}

/* ===== MAIN ===== */
#panel-main{display:none;padding-top:56px;}

.page-header{background:linear-gradient(160deg,var(--navy) 0%,#0d1b35 100%);position:relative;overflow:hidden;}
.page-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 20%,rgba(200,164,77,0.15) 0%,transparent 55%),radial-gradient(ellipse at 10% 90%,rgba(200,164,77,0.08) 0%,transparent 50%);}
.page-header-inner{position:relative;z-index:1;padding:2.5rem 1.5rem 3rem;max-width:1100px;margin:0 auto;}
.page-eyebrow{font-family:'Outfit',sans-serif;font-size:0.65rem;font-weight:800;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:8px;margin-bottom:0.8rem;}
.page-eyebrow::before{content:'';width:16px;height:1.5px;background:var(--gold);}
.page-header h1{font-family:'Shippori Mincho',serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;color:white;line-height:1.3;margin-bottom:0.5rem;}
.page-header p{font-size:0.85rem;color:rgba(255,255,255,0.6);line-height:1.8;}

.inner{max-width:1100px;margin:0 auto;padding:0 1.5rem;width:100%;}
.sec{padding:40px 0;}
.sec-head{margin-bottom:1.5rem;}
.sec-eyebrow{font-family:'Outfit',sans-serif;font-size:0.62rem;font-weight:800;letter-spacing:0.25em;text-transform:uppercase;color:var(--blue);display:flex;align-items:center;gap:8px;margin-bottom:0.5rem;}
.sec-eyebrow::before{content:'';width:14px;height:1.5px;background:var(--gold);}
.sec-title{font-family:'Shippori Mincho',serif;font-size:clamp(1.1rem,2.5vw,1.5rem);font-weight:700;color:var(--navy);}

/* ===== 設定パネル ===== */
.settings-panel{background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:1.8rem;margin-bottom:24px;}
.settings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:1.5rem;}
.form-group label{display:block;font-size:0.72rem;font-weight:700;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;}
.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:0.88rem;font-family:inherit;color:var(--text);background:var(--bg);outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--blue);}

.btn-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.btn{padding:12px 24px;border-radius:12px;border:none;cursor:pointer;font-size:0.88rem;font-weight:700;font-family:inherit;display:inline-flex;align-items:center;gap:8px;transition:all 0.2s;}
.btn-primary{background:linear-gradient(135deg,var(--blue),#1a3d8a);color:white;box-shadow:0 4px 16px rgba(33,74,154,0.25);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(33,74,154,0.35);}
.btn-secondary{background:var(--white);color:var(--navy);border:1.5px solid var(--border);}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#b8933d);color:white;box-shadow:0 4px 16px rgba(200,164,77,0.3);}
.btn-gold:hover{transform:translateY(-1px);opacity:0.9;}

/* ===== カテゴリ説明 ===== */
.category-info{background:rgba(33,74,154,0.04);border:1px solid rgba(33,74,154,0.12);border-radius:14px;padding:1rem 1.2rem;margin-bottom:24px;font-size:0.8rem;line-height:1.8;color:var(--navy);}
.cat-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.cat-chip{font-family:'Outfit',sans-serif;font-size:0.72rem;font-weight:700;padding:4px 12px;border-radius:20px;background:rgba(33,74,154,0.08);color:var(--blue);border:1px solid rgba(33,74,154,0.15);}

/* ===== プレビュー（画面用） ===== */
#qr-preview-wrap{background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:1.8rem;}
.preview-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.preview-header-left{display:flex;flex-direction:column;gap:4px;}
.preview-count{font-family:'Outfit',sans-serif;font-size:0.72rem;color:var(--muted);}
.qr-grid-screen{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;}
.qr-card-screen{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
.qr-canvas-wrap{background:white;padding:4px;border-radius:6px;}
.qr-no{font-family:'Outfit',sans-serif;font-size:0.72rem;font-weight:800;color:var(--navy);letter-spacing:0.05em;}
.qr-name{font-size:0.65rem;color:var(--muted);line-height:1.4;word-break:break-all;}

#empty-state{padding:3rem;text-align:center;color:var(--muted);font-size:0.85rem;}
#empty-state i{font-size:2rem;margin-bottom:1rem;display:block;opacity:0.3;}

/* ===== 印刷スタイル ===== */
@media print{
  body{background:white !important;}
  #site-nav,#panel-main .page-header,
  #panel-main .sec-head,#panel-main .settings-panel,
  #panel-main .category-info,.preview-header,.btn-row,
  footer{display:none !important;}
  #panel-main{display:block !important;padding-top:0 !important;}
  #qr-preview-wrap{border:none !important;padding:0 !important;border-radius:0 !important;}
  .sec{padding:0 !important;}
  .inner{padding:0 !important;max-width:100% !important;}
  #qr-print-sheet{display:block !important;}
  #qr-preview-wrap > *:not(#qr-print-sheet){display:none !important;}
}

#qr-print-sheet{display:none;}

@media print{
  #qr-print-sheet{display:block;width:210mm;padding:8mm;}
  .print-page-title{font-family:'Noto Sans JP',sans-serif;font-size:10pt;font-weight:700;color:#000;text-align:center;margin-bottom:4mm;padding-bottom:3mm;border-bottom:1pt solid #ccc;}
  .print-qr-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4mm;}
  .print-qr-card{border:0.5pt solid #ccc;border-radius:2mm;padding:3mm;display:flex;flex-direction:column;align-items:center;gap:2mm;text-align:center;page-break-inside:avoid;background:white;}
  .print-qr-img{width:28mm;height:28mm;}
  .print-no{font-family:'Outfit',sans-serif;font-size:9pt;font-weight:800;color:#000;letter-spacing:0.05em;}
  .print-name{font-family:'Noto Sans JP',sans-serif;font-size:6.5pt;color:#333;line-height:1.4;word-break:break-all;}
  .print-org{font-family:'Noto Sans JP',sans-serif;font-size:5.5pt;color:#888;}
  .print-logo{width:24mm;height:auto;opacity:0.7;margin-top:1mm;}
}

footer{background:var(--navy);padding:24px 0;text-align:center;margin-top:40px;}
footer p{font-family:'Outfit',sans-serif;font-size:0.68rem;color:rgba(255,255,255,0.3);letter-spacing:.06em;}
</style>
</head>

        </div>
      </div>

    </div>
  </div>

</div><!-- /panel-main -->

<footer>

  { prefix: 'FL',   label: 'フルート',       color: '#5B9BD5' },
  { prefix: 'OB',   label: 'オーボエ',       color: '#70AD47' },

const FULL_ACCESS = ['president', 'vice_president', 'director'];
function hasEquipmentAccess(member) {
  return FULL_ACCESS.includes(member.role || '') || (member.committee || '') === 'equipment';
}

// ============================================================
// 初期化：セッション確認
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    location.href = './panel_equipment.html';
    return;
  }

  try {
    const SB_H = {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${session.access_token}`,
      }
    };
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/members?email=eq.${encodeURIComponent(session.user.email)}&limit=1`,
      SB_H
    );
    const members = await res.json();
    if (!members || members.length === 0 || !hasEquipmentAccess(members[0])) {
      location.href = './panel_equipment.html';
      return;
    }
  } catch(e) {
    console.error(e);
    location.href = './panel_equipment.html';
    return;
  }

  // 権限OK → パネル表示
  document.getElementById('site-nav').style.display   = 'block';
  document.getElementById('panel-main').style.display = 'block';
  initCategoryUI();

// ============================================================
// カテゴリUI初期化
// ============================================================
function initCategoryUI() {
  const chipsEl = document.getElementById('catChips');
  chipsEl.innerHTML = CATEGORIES.map(c =>
    `<span class="cat-chip" style="background:${c.color}20;color:${c.color};border-color:${c.color}40;">
      ${c.prefix} — ${c.label}
    </span>`
  ).join('');

  const sel = document.getElementById('selCategory');
  CATEGORIES.forEach(c => {
    const opt = document.createElement('option');
    opt.value  = c.prefix;
    opt.textContent = `${c.prefix} — ${c.label}`;
    sel.appendChild(opt);
  });
}

// ============================================================
// QR生成
// ============================================================
function generateQR() {
  const category = document.getElementById('selCategory').value;
  const start    = parseInt(document.getElementById('inpStart').value) || 1;
  const end      = parseInt(document.getElementById('inpEnd').value)   || 20;
  const name     = document.getElementById('inpName').value.trim();

  if (start > end) {
    alert('開始番号は終了番号以下にしてください');
    return;
  }
  if (end - start > 99) {
    alert('一度に生成できるのは100件までです');
    return;
  }

  const targets = [];
  if (category === 'ALL') {
    for (let i = start; i <= end; i++) {
      const no = `EQ-${String(i).padStart(3,'0')}`;
      targets.push({ no, label: name || '', prefix: 'EQ' });
    }
  } else {
    for (let i = start; i <= end; i++) {
      const no = `${category}-${String(i).padStart(3,'0')}`;
      targets.push({ no, label: name || '', prefix: category });
    }
  }

  const screenGrid = document.getElementById('qr-grid-screen');
  const emptyState  = document.getElementById('empty-state');
  screenGrid.innerHTML = '';
  emptyState.style.display = 'none';

  const printGrid  = document.getElementById('printGrid');
  const printTitle = document.getElementById('printTitle');
  printGrid.innerHTML = '';
  printTitle.textContent = `楽器管理QRコード — ${category === 'ALL' ? 'EQ' : category} ${String(start).padStart(3,'0')}〜${String(end).padStart(3,'0')} （${targets.length}件）`;

  targets.forEach(t => {
    const url = QR_BASE_URL + encodeURIComponent(t.no);
    const catInfo = CATEGORIES.find(c => c.prefix === t.prefix) || { label: '', color: '#214A9A' };

    // 画面カード
    const card = document.createElement('div');
    card.className = 'qr-card-screen';

    const wrap = document.createElement('div');
    wrap.className = 'qr-canvas-wrap';
    const qrDiv = document.createElement('div');
    wrap.appendChild(qrDiv);
    card.appendChild(wrap);

    const noEl = document.createElement('div');
    noEl.className = 'qr-no';
    noEl.textContent = t.no;
    card.appendChild(noEl);

    if (t.label) {
      const nameEl = document.createElement('div');
      nameEl.className = 'qr-name';
      nameEl.textContent = t.label;
      card.appendChild(nameEl);
    }

    screenGrid.appendChild(card);

    new QRCode(qrDiv, {
      text:   url,
      width:  80,
      height: 80,
      colorDark:  '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });

    // 印刷カード
    const printCard = document.createElement('div');
    printCard.className = 'print-qr-card';

    const printQrDiv = document.createElement('div');
    printQrDiv.style.display = 'none';
    document.body.appendChild(printQrDiv);

    new QRCode(printQrDiv, {
      text:   url,
      width:  120,
      height: 120,
      colorDark:  '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });

    setTimeout(() => {
      const canvas = printQrDiv.querySelector('canvas');
      const img = document.createElement('img');
      img.className = 'print-qr-img';
      if (canvas) {
        img.src = canvas.toDataURL('image/png');
      }
      printCard.appendChild(img);

      const pNo = document.createElement('div');
      pNo.className = 'print-no';
      pNo.textContent = t.no;
      printCard.appendChild(pNo);

      if (t.label) {
        const pName = document.createElement('div');
        pName.className = 'print-name';
        pName.textContent = t.label;
        printCard.appendChild(pName);
      }

      const pOrg = document.createElement('div');
      pOrg.className = 'print-org';
      pOrg.textContent = catInfo.label;
      printCard.appendChild(pOrg);

      const pLogo = document.createElement('img');
      pLogo.className = 'print-logo';
      pLogo.src = LOGO_SRC;
      printCard.appendChild(pLogo);

      printGrid.appendChild(printCard);
      document.body.removeChild(printQrDiv);
    }, 150);
  });

  document.getElementById('previewCount').textContent = `${targets.length}件のQRコード`;
  document.getElementById('btnPrint').style.display = 'inline-flex';
}

// ============================================================
// 印刷
// ============================================================
function printQR() {
  window.print();
}

// ============================================================
// リセット
// ============================================================
function clearAll() {
  document.getElementById('qr-grid-screen').innerHTML = '';
  document.getElementById('empty-state').style.display = 'block';
  document.getElementById('printGrid').innerHTML = '';
  document.getElementById('previewCount').textContent = '';
  document.getElementById('btnPrint').style.display = 'none';
  document.getElementById('inpName').value = '';
  document.getElementById('inpStart').value = '1';
  document.getElementById('inpEnd').value = '20';
  document.getElementById('selCategory').value = 'ALL';
}
</script>
</body>
</html>
