<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRコード印刷 | 楽器管理委員会</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Shippori+Mincho:wght@400;700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<!-- QRコード生成ライブラリ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --blue:#214A9A;--navy:#1C2B4A;--gold:#C8A44D;
  --white:#fff;--bg:#F7F8FA;--text:#1A1A1A;--muted:#606070;--border:#DDE1EC;
  --green:#1D9E75;--red:#C0392B;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;}

/* ===== ロック画面 ===== */
#lock-screen{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(160deg,var(--navy) 0%,#0d1b35 100%);
  display:flex;align-items:center;justify-content:center;padding:1.5rem;
}
#lock-screen::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 70% 30%,rgba(200,164,77,0.15) 0%,transparent 60%),
             radial-gradient(ellipse at 20% 80%,rgba(200,164,77,0.1) 0%,transparent 50%);
}
.lock-card{
  position:relative;z-index:1;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(200,164,77,0.35);
  border-radius:24px;padding:2.5rem 2rem;
  width:100%;max-width:400px;text-align:center;
  backdrop-filter:blur(16px);
}
.lock-icon{font-size:2.5rem;margin-bottom:1rem;}
.lock-eyebrow{
  font-family:'Outfit',sans-serif;font-size:0.6rem;font-weight:800;
  letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);margin-bottom:0.6rem;
}
.lock-title{
  font-family:'Shippori Mincho',serif;
  font-size:1.3rem;font-weight:700;color:white;margin-bottom:0.4rem;
}
.lock-sub{font-size:0.78rem;color:rgba(255,255,255,0.5);margin-bottom:2rem;line-height:1.7;}
.lock-input-wrap{position:relative;margin-bottom:1rem;}
.lock-input{
  width:100%;padding:14px 48px 14px 16px;
  background:rgba(255,255,255,0.08);
  border:1.5px solid rgba(255,255,255,0.15);
  border-radius:12px;color:white;font-size:1rem;font-family:inherit;
  outline:none;transition:border-color 0.2s;letter-spacing:0.15em;text-align:center;
}
.lock-input::placeholder{color:rgba(255,255,255,0.3);letter-spacing:0;}
.lock-input:focus{border-color:var(--gold);}
.lock-input.error{border-color:#E05555;animation:shake 0.3s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.eye-btn{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.4);font-size:0.9rem;
}
.lock-btn{
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--gold),#b8933d);
  color:white;border:none;border-radius:12px;font-size:1rem;font-weight:700;
  font-family:inherit;cursor:pointer;
  box-shadow:0 4px 20px rgba(200,164,77,0.35);transition:opacity 0.2s,transform 0.15s;
}
.lock-btn:hover{opacity:0.9;transform:translateY(-1px);}
.lock-err{font-size:0.78rem;color:#F08080;margin-top:0.8rem;min-height:1.2em;}
.lock-note{font-size:0.68rem;color:rgba(255,255,255,0.22);margin-top:1.5rem;line-height:1.7;}

/* ===== NAV ===== */
#site-nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;height:56px;
  background:rgba(28,43,74,0.97);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(200,164,77,0.25);display:none;
}
.nav-inner{height:100%;display:flex;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto;padding:0 1.5rem;}
#nav-logo{font-family:'Shippori Mincho',serif;color:#fff;font-size:1rem;font-weight:700;text-decoration:none;}
#nav-logo small{display:block;font-family:'Outfit',sans-serif;font-size:0.55rem;color:rgba(255,255,255,0.35);letter-spacing:.14em;font-weight:400;}
.nav-badge{
  font-family:'Outfit',sans-serif;font-size:0.58rem;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;
  background:rgba(200,164,77,0.15);color:var(--gold);
  padding:4px 10px;border-radius:20px;border:1px solid rgba(200,164,77,0.3);
}
.nav-back{
  background:none;border:none;cursor:pointer;
  font-size:0.75rem;color:rgba(255,255,255,0.4);font-family:inherit;
  padding:6px 10px;border-radius:8px;transition:color 0.2s;text-decoration:none;
}
.nav-back:hover{color:rgba(255,255,255,0.8);}

/* ===== MAIN ===== */
#panel-main{display:none;padding-top:56px;}

/* PAGE HEADER */
.page-header{
  background:linear-gradient(160deg,var(--navy) 0%,#0d1b35 100%);
  position:relative;overflow:hidden;
}
.page-header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 80% 20%,rgba(200,164,77,0.15) 0%,transparent 55%),
             radial-gradient(ellipse at 10% 90%,rgba(200,164,77,0.08) 0%,transparent 50%);
}
.page-header-inner{position:relative;z-index:1;padding:2.5rem 1.5rem 3rem;max-width:1100px;margin:0 auto;}
.page-eyebrow{
  font-family:'Outfit',sans-serif;font-size:0.65rem;font-weight:800;
  letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);
  display:flex;align-items:center;gap:8px;margin-bottom:0.8rem;
}
.page-eyebrow::before{content:'';width:16px;height:1.5px;background:var(--gold);}
.page-header h1{
  font-family:'Shippori Mincho',serif;
  font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;color:white;line-height:1.3;margin-bottom:0.5rem;
}
.page-header p{font-size:0.85rem;color:rgba(255,255,255,0.6);line-height:1.8;}

/* ===== LAYOUT ===== */
.inner{max-width:1100px;margin:0 auto;padding:0 1.5rem;width:100%;}
.sec{padding:40px 0;}
.sec-head{margin-bottom:1.5rem;}
.sec-eyebrow{
  font-family:'Outfit',sans-serif;font-size:0.62rem;font-weight:800;
  letter-spacing:0.25em;text-transform:uppercase;color:var(--blue);
  display:flex;align-items:center;gap:8px;margin-bottom:0.5rem;
}
.sec-eyebrow::before{content:'';width:14px;height:1.5px;background:var(--gold);}
.sec-title{
  font-family:'Shippori Mincho',serif;
  font-size:clamp(1.1rem,2.5vw,1.5rem);font-weight:700;color:var(--navy);
}

/* ===== 設定パネル ===== */
.settings-panel{
  background:var(--white);border:1.5px solid var(--border);border-radius:20px;
  padding:1.8rem;margin-bottom:24px;
}
.settings-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;
  margin-bottom:1.5rem;
}
.form-group label{
  display:block;font-size:0.72rem;font-weight:700;color:var(--muted);
  letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;
}
.form-input{
  width:100%;padding:10px 14px;
  border:1.5px solid var(--border);border-radius:10px;
  font-size:0.88rem;font-family:inherit;color:var(--text);
  background:var(--bg);outline:none;transition:border-color 0.2s;
}
.form-input:focus{border-color:var(--blue);}

.btn-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.btn{
  padding:12px 24px;border-radius:12px;border:none;cursor:pointer;
  font-size:0.88rem;font-weight:700;font-family:inherit;
  display:inline-flex;align-items:center;gap:8px;
  transition:all 0.2s;
}
.btn-primary{
  background:linear-gradient(135deg,var(--blue),#1a3d8a);color:white;
  box-shadow:0 4px 16px rgba(33,74,154,0.25);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(33,74,154,0.35);}
.btn-secondary{
  background:var(--white);color:var(--navy);border:1.5px solid var(--border);
}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue);}
.btn-gold{
  background:linear-gradient(135deg,var(--gold),#b8933d);color:white;
  box-shadow:0 4px 16px rgba(200,164,77,0.3);
}
.btn-gold:hover{transform:translateY(-1px);opacity:0.9;}

/* ===== カテゴリ説明 ===== */
.category-info{
  background:rgba(33,74,154,0.04);border:1px solid rgba(33,74,154,0.12);
  border-radius:14px;padding:1rem 1.2rem;margin-bottom:24px;
  font-size:0.8rem;line-height:1.8;color:var(--navy);
}
.cat-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.cat-chip{
  font-family:'Outfit',sans-serif;font-size:0.72rem;font-weight:700;
  padding:4px 12px;border-radius:20px;
  background:rgba(33,74,154,0.08);color:var(--blue);border:1px solid rgba(33,74,154,0.15);
}

/* ===== プレビュー（画面用） ===== */
#qr-preview-wrap{
  background:var(--white);border:1.5px solid var(--border);border-radius:20px;
  padding:1.8rem;
}
.preview-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.2rem;padding-bottom:1rem;border-bottom:1px solid var(--border);
}
.preview-header-left{display:flex;flex-direction:column;gap:4px;}
.preview-count{
  font-family:'Outfit',sans-serif;font-size:0.72rem;color:var(--muted);
}
.qr-grid-screen{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:16px;
}
.qr-card-screen{
  background:var(--bg);border:1px solid var(--border);border-radius:12px;
  padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px;
  text-align:center;
}
.qr-canvas-wrap{
  width:90px;height:90px;display:flex;align-items:center;justify-content:center;
  background:white;border-radius:6px;padding:4px;
}
.qr-no{font-family:'Outfit',sans-serif;font-size:0.82rem;font-weight:800;color:var(--navy);}
.qr-name{font-size:0.68rem;color:var(--muted);line-height:1.4;word-break:break-all;}

#empty-state{
  padding:3rem;text-align:center;color:var(--muted);font-size:0.85rem;
}
#empty-state i{font-size:2rem;margin-bottom:1rem;display:block;opacity:0.3;}

/* ===== 印刷スタイル ===== */
@media print{
  body{background:white !important;}
  #lock-screen,#site-nav,#panel-main .page-header,
  #panel-main .sec-head,#panel-main .settings-panel,
  #panel-main .category-info,.preview-header,.btn-row,
  footer{display:none !important;}
  #panel-main{display:block !important;padding-top:0 !important;}
  #qr-preview-wrap{
    border:none !important;padding:0 !important;border-radius:0 !important;
  }
  .sec{padding:0 !important;}
  .inner{padding:0 !important;max-width:100% !important;}
  #qr-print-sheet{display:block !important;}
  #qr-preview-wrap > *:not(#qr-print-sheet){display:none !important;}
}

/* 印刷用シート（画面では非表示） */
#qr-print-sheet{display:none;}

@media print{
  #qr-print-sheet{
    display:block;
    width:210mm;
    padding:8mm;
  }
  .print-page-title{
    font-family:'Noto Sans JP',sans-serif;
    font-size:10pt;font-weight:700;color:#000;
    text-align:center;margin-bottom:4mm;
    padding-bottom:3mm;border-bottom:1pt solid #ccc;
  }
  .print-qr-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:4mm;
  }
  .print-qr-card{
    border:0.5pt solid #ccc;border-radius:2mm;
    padding:3mm;
    display:flex;flex-direction:column;align-items:center;gap:2mm;
    text-align:center;
    page-break-inside:avoid;
    background:white;
  }
  .print-qr-img{
    width:28mm;height:28mm;
  }
  .print-no{
    font-family:'Outfit',sans-serif;font-size:9pt;font-weight:800;color:#000;
    letter-spacing:0.05em;
  }
  .print-name{
    font-family:'Noto Sans JP',sans-serif;font-size:6.5pt;color:#333;
    line-height:1.4;word-break:break-all;
  }
  .print-org{
    font-family:'Noto Sans JP',sans-serif;font-size:5.5pt;color:#888;
  }
}

footer{background:var(--navy);padding:24px 0;text-align:center;margin-top:40px;}
footer p{font-family:'Outfit',sans-serif;font-size:0.68rem;color:rgba(255,255,255,0.3);letter-spacing:.06em;}
</style>
</head>
<body>

<!-- ===== LOCK ===== -->
<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">🎺</div>
    <div class="lock-eyebrow">EQUIPMENT COMMITTEE</div>
    <div class="lock-title">楽器管理委員会</div>
    <div class="lock-sub">アクセスコードを入力してください</div>
    <div class="lock-input-wrap">
      <input class="lock-input" type="password" id="codeInput" placeholder="ACCESS CODE"
        onkeydown="if(event.key==='Enter')unlock()">
      <button class="eye-btn" onclick="toggleEye()" id="eyeBtn"><i class="fa-solid fa-eye-slash"></i></button>
    </div>
    <button class="lock-btn" onclick="unlock()">
      <i class="fa-solid fa-drum" style="margin-right:8px;"></i>ログイン
    </button>
    <div class="lock-err" id="lockErr"></div>
    <div class="lock-note">このページは委員会メンバー専用です<br>URLの共有・スクリーンショットはご遠慮ください</div>
  </div>
</div>

<!-- ===== NAV ===== -->
<nav id="site-nav">
  <div class="nav-inner">
    <a id="nav-logo" href="./member.html">
      東大阪吹奏楽団
      <small>HIGASUI WINDS</small>
    </a>
    <span class="nav-badge">EQUIPMENT</span>
    <a class="nav-back" href="./panel_equipment.html">
      <i class="fa-solid fa-chevron-left"></i> 戻る
    </a>
  </div>
</nav>

<!-- ===== MAIN ===== -->
<div id="panel-main">

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-inner">
      <div class="page-eyebrow"><span>EQUIPMENT / QR PRINT</span></div>
      <h1>QRコード<br>一括印刷</h1>
      <p>管理番号QRをA4用紙に印刷してシール・タグに使用します</p>
    </div>
  </div>

  <div class="sec">
    <div class="inner">

      <!-- カテゴリ説明 -->
      <div class="category-info">
        <strong>カテゴリ別管理番号プレフィックス一覧</strong>
        <div class="cat-chips" id="catChips">
          <!-- JSで生成 -->
        </div>
      </div>

      <!-- 設定パネル -->
      <div class="settings-panel">
        <div class="sec-head">
          <div class="sec-eyebrow"><span>SETTINGS</span></div>
          <div class="sec-title">印刷設定</div>
        </div>

        <div class="settings-grid">
          <div class="form-group">
            <label>カテゴリ</label>
            <select class="form-input" id="selCategory">
              <option value="ALL">すべて</option>
              <!-- JSで生成 -->
            </select>
          </div>
          <div class="form-group">
            <label>開始番号</label>
            <input class="form-input" type="number" id="inpStart" value="1" min="1">
          </div>
          <div class="form-group">
            <label>終了番号</label>
            <input class="form-input" type="number" id="inpEnd" value="20" min="1">
          </div>
          <div class="form-group">
            <label>楽器名（任意）</label>
            <input class="form-input" type="text" id="inpName" placeholder="例：トランペット">
          </div>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" onclick="generateQR()">
            <i class="fa-solid fa-qrcode"></i> QR生成・プレビュー
          </button>
          <button class="btn btn-gold" onclick="printQR()" id="btnPrint" style="display:none;">
            <i class="fa-solid fa-print"></i> 印刷する（A4）
          </button>
          <button class="btn btn-secondary" onclick="clearAll()">
            <i class="fa-solid fa-rotate-left"></i> リセット
          </button>
        </div>
      </div>

      <!-- プレビューエリア -->
      <div id="qr-preview-wrap">
        <div class="preview-header">
          <div class="preview-header-left">
            <div class="sec-eyebrow"><span>PREVIEW</span></div>
            <div class="sec-title">プレビュー</div>
          </div>
          <div class="preview-count" id="previewCount"></div>
        </div>

        <!-- 画面プレビュー -->
        <div id="qr-grid-screen" class="qr-grid-screen"></div>
        <div id="empty-state">
          <i class="fa-solid fa-qrcode"></i>
          上の設定でQRを生成してください
        </div>

        <!-- 印刷用シート（画面では非表示・印刷時に表示） -->
        <div id="qr-print-sheet">
          <div class="print-page-title" id="printTitle"></div>
          <div class="print-qr-grid" id="printGrid"></div>
        </div>
      </div>

    </div>
  </div>

</div><!-- /panel-main -->

<footer>
  <p>© 東大阪吹奏楽団 楽器管理委員会 | EQUIPMENT COMMITTEE PANEL</p>
</footer>

<script>
// ============================================================
// 定数
// ============================================================
const SUPABASE_URL = 'https://eqnacealnnmpipapdguc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxbmFjZWFsbm5tcGlwYXBkZ3VjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzI4MjgsImV4cCI6MjA4OTQwODgyOH0.XI948sgJf6gWXs-sU9iiqxBXDB_S50ZBz__IeV1hA-0';
const SB_H = { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } };

const CORRECT_CODE = 'EQUIPMENT';
const SESSION_KEY  = 'panel_equipment_auth';

// QRコードを読んだとき飛ぶベースURL
const QR_BASE_URL = 'https://higashiosakawinds-prog.github.io/higasui/panel_equipment_list.html?no=';

// カテゴリ定義
const CATEGORIES = [
  { prefix: 'FL',   label: 'フルート',       color: '#5B9BD5' },
  { prefix: 'OB',   label: 'オーボエ',       color: '#70AD47' },
  { prefix: 'CL',   label: 'クラリネット',   color: '#ED7D31' },
  { prefix: 'BS',   label: 'バスーン',       color: '#A5A5A5' },
  { prefix: 'SX',   label: 'サックス',       color: '#FFC000' },
  { prefix: 'HR',   label: 'ホルン',         color: '#C8A44D' },
  { prefix: 'TP',   label: 'トランペット',   color: '#214A9A' },
  { prefix: 'TB',   label: 'トロンボーン',   color: '#1C2B4A' },
  { prefix: 'EU',   label: 'ユーフォニアム', color: '#7030A0' },
  { prefix: 'TU',   label: 'チューバ',       color: '#1D9E75' },
  { prefix: 'CB',   label: 'コントラバス',   color: '#833C00' },
  { prefix: 'PERC', label: '打楽器',         color: '#C0392B' },
  { prefix: 'EQ',   label: 'その他備品',     color: '#606070' },
];

// ============================================================
// ロック
// ============================================================
function unlock() {
  const val = document.getElementById('codeInput').value.trim().toUpperCase();
  if (val === CORRECT_CODE) {
    sessionStorage.setItem(SESSION_KEY, '1');
    showPanel();
  } else {
    const inp = document.getElementById('codeInput');
    inp.classList.add('error');
    document.getElementById('lockErr').textContent = 'コードが正しくありません';
    setTimeout(() => inp.classList.remove('error'), 400);
  }
}

function toggleEye() {
  const inp = document.getElementById('codeInput');
  const btn = document.getElementById('eyeBtn');
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.innerHTML = '<i class="fa-solid fa-eye"></i>';
  } else {
    inp.type = 'password';
    btn.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
  }
}

function showPanel() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('site-nav').style.display   = 'block';
  document.getElementById('panel-main').style.display = 'block';
  initCategoryUI();
}

window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem(SESSION_KEY) === '1') showPanel();
});

// ============================================================
// カテゴリUI初期化
// ============================================================
function initCategoryUI() {
  // チップス
  const chipsEl = document.getElementById('catChips');
  chipsEl.innerHTML = CATEGORIES.map(c =>
    `<span class="cat-chip" style="background:${c.color}20;color:${c.color};border-color:${c.color}40;">
      ${c.prefix} — ${c.label}
    </span>`
  ).join('');

  // セレクト
  const sel = document.getElementById('selCategory');
  CATEGORIES.forEach(c => {
    const opt = document.createElement('option');
    opt.value  = c.prefix;
    opt.textContent = `${c.prefix} — ${c.label}`;
    sel.appendChild(opt);
  });
}

// ============================================================
// QR生成
// ============================================================
function generateQR() {
  const category = document.getElementById('selCategory').value;
  const start    = parseInt(document.getElementById('inpStart').value) || 1;
  const end      = parseInt(document.getElementById('inpEnd').value)   || 20;
  const name     = document.getElementById('inpName').value.trim();

  if (start > end) {
    alert('開始番号は終了番号以下にしてください');
    return;
  }
  if (end - start > 99) {
    alert('一度に生成できるのは100件までです');
    return;
  }

  // カテゴリ一覧を展開（ALLなら全カテゴリ×番号）
  const targets = [];
  if (category === 'ALL') {
    // ALLの場合は選択カテゴリなしで番号だけ使う → EQ-001..EQ-XXX風に汎用番号
    for (let i = start; i <= end; i++) {
      const no = `EQ-${String(i).padStart(3,'0')}`;
      targets.push({ no, label: name || '', prefix: 'EQ' });
    }
  } else {
    for (let i = start; i <= end; i++) {
      const no = `${category}-${String(i).padStart(3,'0')}`;
      targets.push({ no, label: name || '', prefix: category });
    }
  }

  // 画面プレビュー描画
  const screenGrid = document.getElementById('qr-grid-screen');
  const emptyState  = document.getElementById('empty-state');
  screenGrid.innerHTML = '';
  emptyState.style.display = 'none';

  // 印刷グリッドも同時に構築
  const printGrid  = document.getElementById('printGrid');
  const printTitle = document.getElementById('printTitle');
  printGrid.innerHTML = '';
  printTitle.textContent = `楽器管理QRコード — ${category === 'ALL' ? 'EQ' : category} ${String(start).padStart(3,'0')}〜${String(end).padStart(3,'0')} （${targets.length}件）`;

  targets.forEach(t => {
    const url = QR_BASE_URL + encodeURIComponent(t.no);
    const catInfo = CATEGORIES.find(c => c.prefix === t.prefix) || { label: '', color: '#214A9A' };

    // ---- 画面カード ----
    const card = document.createElement('div');
    card.className = 'qr-card-screen';

    const wrap = document.createElement('div');
    wrap.className = 'qr-canvas-wrap';
    const qrDiv = document.createElement('div');
    wrap.appendChild(qrDiv);
    card.appendChild(wrap);

    const noEl = document.createElement('div');
    noEl.className = 'qr-no';
    noEl.textContent = t.no;
    card.appendChild(noEl);

    if (t.label) {
      const nameEl = document.createElement('div');
      nameEl.className = 'qr-name';
      nameEl.textContent = t.label;
      card.appendChild(nameEl);
    }

    screenGrid.appendChild(card);

    // QR描画（画面用・小さめ）
    new QRCode(qrDiv, {
      text:   url,
      width:  80,
      height: 80,
      colorDark:  '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });

    // ---- 印刷カード ----
    const printCard = document.createElement('div');
    printCard.className = 'print-qr-card';

    // 印刷用QRはCanvas→dataURL経由でimgに変換（印刷ズレ防止）
    const printQrDiv = document.createElement('div');
    printQrDiv.style.display = 'none';
    document.body.appendChild(printQrDiv);

    new QRCode(printQrDiv, {
      text:   url,
      width:  120,
      height: 120,
      colorDark:  '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });

    // Canvasが描画されたあとでimgに変換
    setTimeout(() => {
      const canvas = printQrDiv.querySelector('canvas');
      const img = document.createElement('img');
      img.className = 'print-qr-img';
      if (canvas) {
        img.src = canvas.toDataURL('image/png');
      }
      printCard.appendChild(img);

      const pNo = document.createElement('div');
      pNo.className = 'print-no';
      pNo.textContent = t.no;
      printCard.appendChild(pNo);

      if (t.label) {
        const pName = document.createElement('div');
        pName.className = 'print-name';
        pName.textContent = t.label;
        printCard.appendChild(pName);
      }

      const pOrg = document.createElement('div');
      pOrg.className = 'print-org';
      pOrg.textContent = catInfo.label;
      printCard.appendChild(pOrg);

      printGrid.appendChild(printCard);
      document.body.removeChild(printQrDiv);
    }, 150);
  });

  // カウント表示・印刷ボタン表示
  document.getElementById('previewCount').textContent = `${targets.length}件のQRコード`;
  document.getElementById('btnPrint').style.display = 'inline-flex';
}

// ============================================================
// 印刷
// ============================================================
function printQR() {
  window.print();
}

// ============================================================
// リセット
// ============================================================
function clearAll() {
  document.getElementById('qr-grid-screen').innerHTML = '';
  document.getElementById('empty-state').style.display = 'block';
  document.getElementById('printGrid').innerHTML = '';
  document.getElementById('previewCount').textContent = '';
  document.getElementById('btnPrint').style.display = 'none';
  document.getElementById('inpName').value = '';
  document.getElementById('inpStart').value = '1';
  document.getElementById('inpEnd').value = '20';
  document.getElementById('selCategory').value = 'ALL';
}
</script>
