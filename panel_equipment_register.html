<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楽器登録・編集 | 楽器管理委員会</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Shippori+Mincho:wght@400;700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --blue:#214A9A;--navy:#1C2B4A;--gold:#C8A44D;
  --white:#fff;--bg:#F7F8FA;--text:#1A1A1A;--muted:#606070;--border:#DDE1EC;
  --green:#1D9E75;--red:#C0392B;--orange:#E67E22;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;}

/* ===== NAV ===== */
#site-nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:56px;background:rgba(28,43,74,0.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,164,77,0.25);display:none;}
.nav-inner{height:100%;display:flex;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto;padding:0 1.5rem;}
#nav-logo{font-family:'Shippori Mincho',serif;color:#fff;font-size:1rem;font-weight:700;text-decoration:none;}
#nav-logo small{display:block;font-family:'Outfit',sans-serif;font-size:0.55rem;color:rgba(255,255,255,0.35);letter-spacing:.14em;font-weight:400;}
.nav-badge{font-family:'Outfit',sans-serif;font-size:0.58rem;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;background:rgba(200,164,77,0.15);color:var(--gold);padding:4px 10px;border-radius:20px;border:1px solid rgba(200,164,77,0.3);}
.nav-back{background:none;border:none;cursor:pointer;font-size:0.75rem;color:rgba(255,255,255,0.4);font-family:inherit;padding:6px 10px;border-radius:8px;transition:color 0.2s;text-decoration:none;}
.nav-back:hover{color:rgba(255,255,255,0.8);}

/* ===== MAIN ===== */
#panel-main{display:none;padding-top:56px;}
.page-header{background:linear-gradient(160deg,var(--navy) 0%,#0d1b35 100%);position:relative;overflow:hidden;}
.page-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 20%,rgba(200,164,77,0.15) 0%,transparent 55%),radial-gradient(ellipse at 10% 90%,rgba(200,164,77,0.08) 0%,transparent 50%);}
.page-header-inner{position:relative;z-index:1;padding:2.5rem 1.5rem 3rem;max-width:800px;margin:0 auto;}
.page-eyebrow{font-family:'Outfit',sans-serif;font-size:0.65rem;font-weight:800;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:8px;margin-bottom:0.8rem;}
.page-eyebrow::before{content:'';width:16px;height:1.5px;background:var(--gold);}
.page-header h1{font-family:'Shippori Mincho',serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;color:white;line-height:1.3;margin-bottom:0.5rem;}
.page-header p{font-size:0.85rem;color:rgba(255,255,255,0.6);line-height:1.8;}

.inner{max-width:800px;margin:0 auto;padding:0 1.5rem;width:100%;}
.sec{padding:32px 0 48px;}

/* ===== セクションカード ===== */
.form-section{background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:1.8rem;margin-bottom:20px;}
.form-section-head{display:flex;align-items:center;gap:12px;margin-bottom:1.4rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.form-section-icon{width:36px;height:36px;border-radius:10px;background:rgba(33,74,154,0.1);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:0.95rem;flex-shrink:0;}
.form-section-title{font-family:'Shippori Mincho',serif;font-size:1rem;font-weight:700;color:var(--navy);}
.form-section-sub{font-size:0.72rem;color:var(--muted);margin-top:2px;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-grid.col3{grid-template-columns:1fr 1fr 1fr;}
.form-grid.col1{grid-template-columns:1fr;}
@media(max-width:560px){.form-grid,.form-grid.col3{grid-template-columns:1fr;}}

.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.span2{grid-column:span 2;}
@media(max-width:560px){.form-group.span2{grid-column:span 1;}}

label{font-size:0.72rem;font-weight:700;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;}
label .req{color:var(--red);margin-left:3px;}
.form-input,.form-select,.form-textarea{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:0.88rem;font-family:inherit;color:var(--text);background:var(--bg);
  outline:none;transition:border-color 0.2s;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue);background:var(--white);}
.form-input.error,.form-select.error{border-color:var(--red);}
.form-textarea{resize:vertical;min-height:80px;line-height:1.6;}
.form-hint{font-size:0.7rem;color:var(--muted);margin-top:2px;}

/* 管理番号プレビュー */
.no-preview{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(33,74,154,0.05);border:1.5px solid rgba(33,74,154,0.2);border-radius:10px;margin-top:4px;}
.no-preview-val{font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:800;color:var(--blue);}
.no-preview-label{font-size:0.72rem;color:var(--muted);}

/* 所有者トグル */
.owner-toggle{display:flex;gap:8px;}
.owner-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);font-size:0.85rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all 0.2s;text-align:center;}
.owner-btn.active{border-color:var(--blue);background:rgba(33,74,154,0.08);color:var(--blue);}
#owner-name-wrap{display:none;}

/* ===== 送信ボタン ===== */
.submit-area{display:flex;gap:12px;justify-content:flex-end;flex-wrap:wrap;margin-top:8px;}
.btn{padding:12px 28px;border-radius:12px;border:none;cursor:pointer;font-size:0.9rem;font-weight:700;font-family:inherit;display:inline-flex;align-items:center;gap:8px;transition:all 0.2s;}
.btn-primary{background:linear-gradient(135deg,var(--blue),#1a3d8a);color:white;box-shadow:0 4px 16px rgba(33,74,154,0.25);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(33,74,154,0.35);}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.btn-secondary{background:var(--white);color:var(--navy);border:1.5px solid var(--border);text-decoration:none;}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue);}
.btn-danger{background:rgba(192,57,43,0.08);color:var(--red);border:1.5px solid rgba(192,57,43,0.2);}
.btn-danger:hover{background:rgba(192,57,43,0.15);}

/* ===== トースト ===== */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:white;padding:12px 24px;border-radius:12px;font-size:0.85rem;font-weight:700;z-index:9000;transition:transform 0.3s ease;pointer-events:none;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.success{background:var(--green);}
#toast.error{background:var(--red);}

/* 削除確認モーダル */
#del-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px);}
#del-overlay.open{display:flex;}
.del-card{background:var(--white);border-radius:20px;padding:2rem;width:100%;max-width:400px;text-align:center;}
.del-icon{font-size:2.5rem;margin-bottom:1rem;}
.del-title{font-family:'Shippori Mincho',serif;font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:0.5rem;}
.del-sub{font-size:0.82rem;color:var(--muted);line-height:1.7;margin-bottom:1.5rem;}
.del-btns{display:flex;gap:10px;}

footer{background:var(--navy);padding:24px 0;text-align:center;margin-top:40px;}
footer p{font-family:'Outfit',sans-serif;font-size:0.68rem;color:rgba(255,255,255,0.3);letter-spacing:.06em;}
</style>
</head>
<body>

<!-- ===== NAV ===== -->
<nav id="site-nav">
  <div class="nav-inner">
    <a id="nav-logo" href="./member.html">東大阪吹奏楽団<small>HIGASUI WINDS</small></a>
    <span class="nav-badge">EQUIPMENT</span>
    <a class="nav-back" href="./panel_equipment_list.html"><i class="fa-solid fa-chevron-left"></i> 一覧へ</a>
  </div>
</nav>

<!-- ===== MAIN ===== -->
<div id="panel-main">
  <div class="page-header">
    <div class="page-header-inner">
      <div class="page-eyebrow"><span id="page-mode-label">EQUIPMENT / REGISTER</span></div>
      <h1 id="page-title">楽器登録</h1>
      <p id="page-desc">新しい楽器をシステムに登録します</p>
    </div>
  </div>

  <div class="sec">
    <div class="inner">

      <!-- ① 基本情報 -->
      <div class="form-section">
        <div class="form-section-head">
          <div class="form-section-icon"><i class="fa-solid fa-tag"></i></div>
          <div>
            <div class="form-section-title">基本情報</div>
            <div class="form-section-sub">管理番号・楽器名・所有者など必須項目</div>
          </div>
        </div>

        <div class="form-grid col3">
          <div class="form-group">
            <label>カテゴリ<span class="req">*</span></label>
            <select class="form-select" id="fCategory" onchange="updateNoPreview()">
              <option value="">選択してください</option>
              <option value="FL">FL — フルート</option>
              <option value="OB">OB — オーボエ</option>
              <option value="CL">CL — クラリネット</option>
              <option value="BS">BS — バスーン</option>
              <option value="SX">SX — サックス</option>
              <option value="HR">HR — ホルン</option>
              <option value="TP">TP — トランペット</option>
              <option value="TB">TB — トロンボーン</option>
              <option value="EU">EU — ユーフォニアム</option>
              <option value="TU">TU — チューバ</option>
              <option value="CB">CB — コントラバス</option>
              <option value="PERC">PERC — 打楽器</option>
              <option value="EQ">EQ — その他備品</option>
            </select>
          </div>
          <div class="form-group">
            <label>連番<span class="req">*</span></label>
            <input class="form-input" type="number" id="fSeq" placeholder="例: 1" min="1" oninput="updateNoPreview()">
            <div class="form-hint">001, 002… と自動でゼロ埋めします</div>
          </div>
          <div class="form-group">
            <label>管理番号（自動生成）</label>
            <div class="no-preview">
              <div>
                <div class="no-preview-val" id="noPreview">—</div>
                <div class="no-preview-label">QRコードに使用</div>
              </div>
            </div>
          </div>
        </div>

        <div class="form-grid" style="margin-top:16px;">
          <div class="form-group span2">
            <label>楽器名<span class="req">*</span></label>
            <input class="form-input" type="text" id="fName" placeholder="例: トランペット（B♭管）1番">
          </div>
        </div>

        <div class="form-grid" style="margin-top:16px;">
          <div class="form-group">
            <label>所有者<span class="req">*</span></label>
            <div class="owner-toggle">
              <button class="owner-btn active" id="btnOwn" onclick="setOwner('own')">団所有</button>
              <button class="owner-btn" id="btnBorrowed" onclick="setOwner('borrowed')">借用</button>
            </div>
          </div>
          <div class="form-group" id="owner-name-wrap">
            <label>借用元<span class="req">*</span></label>
            <input class="form-input" type="text" id="fOwnerName" placeholder="例: ○○学校">
          </div>
        </div>
      </div>

      <!-- ② 状態・保管 -->
      <div class="form-section">
        <div class="form-section-head">
          <div class="form-section-icon"><i class="fa-solid fa-warehouse"></i></div>
          <div>
            <div class="form-section-title">状態・保管情報</div>
            <div class="form-section-sub">現在の状態と保管場所</div>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>状態<span class="req">*</span></label>
            <select class="form-select" id="fCondition" onchange="toggleRepairDate()">
              <option value="good">良好</option>
              <option value="needs_repair">要修繕</option>
              <option value="in_repair">修理中</option>
            </select>
          </div>
          <div class="form-group" id="repair-date-wrap" style="display:none;">
            <label>修繕返却予定日</label>
            <input class="form-input" type="date" id="fRepairDue">
          </div>
        </div>

        <div class="form-grid col1" style="margin-top:16px;">
          <div class="form-group">
            <label>状態メモ</label>
            <input class="form-input" type="text" id="fConditionNote" placeholder="例: ピストンの動きが重い・管体に凹みあり">
          </div>
        </div>

        <div class="form-grid" style="margin-top:16px;">
          <div class="form-group">
            <label>保管場所</label>
            <input class="form-input" type="text" id="fLocation" placeholder="例: 倉庫A・第2練習室ラック">
          </div>
          <div class="form-group">
            <label>取得日</label>
            <input class="form-input" type="date" id="fAcquiredDate">
          </div>
        </div>
      </div>

      <!-- ③ 備考 -->
      <div class="form-section">
        <div class="form-section-head">
          <div class="form-section-icon"><i class="fa-solid fa-note-sticky"></i></div>
          <div>
            <div class="form-section-title">備考・追加メモ</div>
            <div class="form-section-sub">先生からの要望・団員希望・その他メモ</div>
          </div>
        </div>
        <div class="form-group">
          <label>備考</label>
          <textarea class="form-textarea" id="fNote" placeholder="例: ○○先生から「ベルのへこみを直してほしい」との依頼あり（2026/3）"></textarea>
        </div>
      </div>

      <!-- 送信ボタン -->
      <div class="submit-area">
        <button class="btn btn-danger" id="btnDelete" style="display:none;" onclick="confirmDelete()">
          <i class="fa-solid fa-trash"></i> この楽器を削除
        </button>
        <a class="btn btn-secondary" href="./panel_equipment_list.html">キャンセル</a>
        <button class="btn btn-primary" id="btnSubmit" onclick="submitForm()">
          <i class="fa-solid fa-floppy-disk"></i> <span id="btnSubmitLabel">登録する</span>
        </button>
      </div>

    </div>
  </div>
</div>

<!-- 削除確認モーダル -->
<div id="del-overlay" onclick="closeDelOutside(event)">
  <div class="del-card">
    <div class="del-icon">🗑️</div>
    <div class="del-title">この楽器を削除しますか？</div>
    <div class="del-sub" id="del-target-name">削除すると貸出記録も参照できなくなります。<br>本当に削除してよい場合のみ実行してください。</div>
    <div class="del-btns">
      <button class="btn btn-secondary" style="flex:1;" onclick="closeDelModal()">キャンセル</button>
      <button class="btn btn-danger" style="flex:1;" onclick="execDelete()"><i class="fa-solid fa-trash"></i> 削除する</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<footer><p>© 東大阪吹奏楽団 楽器管理委員会 | EQUIPMENT COMMITTEE PANEL</p></footer>

<script>
// ============================================================
// 設定
// ============================================================
const SUPABASE_URL = 'https://eqnacealnnmpipapdguc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxbmFjZWFsbm5tcGlwYXBkZ3VjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzI4MjgsImV4cCI6MjA4OTQwODgyOH0.XI948sgJf6gWXs-sU9iiqxBXDB_S50ZBz__IeV1hA-0';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function makeSB(token) {
  return {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
    }
  };
}

const FULL_ACCESS = ['president', 'vice_president', 'director'];
function hasEquipmentAccess(member) {
  return FULL_ACCESS.includes(member.role || '') || (member.committee || '') === 'equipment';
}

// ============================================================
// 状態
// ============================================================
let editId  = null;
let ownerType = 'own';
let SB_H    = null;

// ============================================================
// 初期化：セッション確認
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    location.href = './panel_equipment.html';
    return;
  }

  try {
    SB_H = makeSB(session.access_token);
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/members?email=eq.${encodeURIComponent(session.user.email)}&limit=1`,
      SB_H
    );
    const members = await res.json();
    if (!members || members.length === 0 || !hasEquipmentAccess(members[0])) {
      location.href = './panel_equipment.html';
      return;
    }
  } catch(e) {
    console.error(e);
    location.href = './panel_equipment.html';
    return;
  }

  // 権限OK → パネル表示
  document.getElementById('site-nav').style.display   = 'block';
  document.getElementById('panel-main').style.display = 'block';
  initPage();
});

// ============================================================
// 初期化：新規 or 編集の判定
// ============================================================
function initPage() {
  const params = new URLSearchParams(location.search);
  editId = params.get('id') || null;

  if (editId) {
    document.getElementById('page-mode-label').textContent = 'EQUIPMENT / EDIT';
    document.getElementById('page-title').textContent = '楽器情報を編集';
    document.getElementById('page-desc').textContent  = '登録済みの楽器情報を更新します';
    document.getElementById('btnSubmitLabel').textContent = '更新する';
    document.getElementById('btnDelete').style.display = 'inline-flex';
    loadExistingData();
  }
}

// ============================================================
// 編集時：既存データ読み込み
// ============================================================
async function loadExistingData() {
  try {
    const res  = await fetch(`${SUPABASE_URL}/rest/v1/instruments?id=eq.${editId}&select=*`, SB_H);
    const data = await res.json();
    if (!data.length) { showToast('楽器が見つかりません', 'error'); return; }
    const inst = data[0];

    const parts = inst.instrument_no.split('-');
    const prefix = parts[0];
    const seq    = parseInt(parts[1]) || '';

    document.getElementById('fCategory').value      = prefix;
    document.getElementById('fSeq').value           = seq;
    document.getElementById('fName').value          = inst.name || '';
    document.getElementById('fCondition').value     = inst.condition || 'good';
    document.getElementById('fConditionNote').value = inst.condition_note || '';
    document.getElementById('fLocation').value      = inst.location || '';
    document.getElementById('fAcquiredDate').value  = inst.acquired_date || '';
    document.getElementById('fRepairDue').value     = inst.repair_return_due || '';
    document.getElementById('fNote').value          = inst.note || '';

    setOwner(inst.owner_type || 'own');
    if (inst.owner_name) document.getElementById('fOwnerName').value = inst.owner_name;

    updateNoPreview();
    toggleRepairDate();

    document.getElementById('del-target-name').textContent =
      `「${inst.instrument_no}：${inst.name}」を削除します。貸出記録も参照できなくなります。本当によい場合のみ実行してください。`;

  } catch(e) {
    console.error(e);
    showToast('データ取得に失敗しました', 'error');
  }
}

// ============================================================
// UI操作
// ============================================================
function updateNoPreview() {
  const cat = document.getElementById('fCategory').value;
  const seq = parseInt(document.getElementById('fSeq').value);
  if (cat && seq > 0) {
    document.getElementById('noPreview').textContent = `${cat}-${String(seq).padStart(3,'0')}`;
  } else {
    document.getElementById('noPreview').textContent = '—';
  }
}

function setOwner(type) {
  ownerType = type;
  document.getElementById('btnOwn').classList.toggle('active', type === 'own');
  document.getElementById('btnBorrowed').classList.toggle('active', type === 'borrowed');
  document.getElementById('owner-name-wrap').style.display = type === 'borrowed' ? 'flex' : 'none';
}

function toggleRepairDate() {
  const cond = document.getElementById('fCondition').value;
  document.getElementById('repair-date-wrap').style.display =
    (cond === 'in_repair' || cond === 'needs_repair') ? 'flex' : 'none';
}

// ============================================================
// バリデーション
// ============================================================
function validate() {
  let ok = true;
  const required = [
    { id:'fCategory', msg:'カテゴリを選択してください' },
    { id:'fSeq',      msg:'連番を入力してください' },
    { id:'fName',     msg:'楽器名を入力してください' },
  ];
  required.forEach(r => {
    const el = document.getElementById(r.id);
    if (!el.value.trim()) {
      el.classList.add('error');
      ok = false;
    } else {
      el.classList.remove('error');
    }
  });
  if (ownerType === 'borrowed' && !document.getElementById('fOwnerName').value.trim()) {
    document.getElementById('fOwnerName').classList.add('error');
    ok = false;
  } else {
    document.getElementById('fOwnerName').classList.remove('error');
  }
  if (!ok) showToast('必須項目を入力してください', 'error');
  return ok;
}

// ============================================================
// 送信
// ============================================================
async function submitForm() {
  if (!validate()) return;

  const cat = document.getElementById('fCategory').value;
  const seq = parseInt(document.getElementById('fSeq').value);
  const instrumentNo = `${cat}-${String(seq).padStart(3,'0')}`;

  const payload = {
    instrument_no:     instrumentNo,
    name:              document.getElementById('fName').value.trim(),
    category:          cat,
    owner_type:        ownerType,
    owner_name:        ownerType === 'borrowed' ? document.getElementById('fOwnerName').value.trim() : null,
    condition:         document.getElementById('fCondition').value,
    condition_note:    document.getElementById('fConditionNote').value.trim() || null,
    location:          document.getElementById('fLocation').value.trim() || null,
    acquired_date:     document.getElementById('fAcquiredDate').value || null,
    repair_return_due: document.getElementById('fRepairDue').value || null,
    note:              document.getElementById('fNote').value.trim() || null,
    is_active:         true,
  };

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 処理中…';

  try {
    let res;
    if (editId) {
      res = await fetch(`${SUPABASE_URL}/rest/v1/instruments?id=eq.${editId}`, {
        method: 'PATCH',
        headers: { ...SB_H.headers, 'Prefer': 'return=minimal' },
        body: JSON.stringify(payload),
      });
    } else {
      // 管理番号の重複チェック
      const dupCheck = await fetch(`${SUPABASE_URL}/rest/v1/instruments?instrument_no=eq.${instrumentNo}&select=id`, SB_H);
      const dups = await dupCheck.json();
      if (dups.length > 0) {
        showToast(`管理番号 ${instrumentNo} はすでに登録されています`, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> <span id="btnSubmitLabel">登録する</span>';
        return;
      }
      res = await fetch(`${SUPABASE_URL}/rest/v1/instruments`, {
        method: 'POST',
        headers: { ...SB_H.headers, 'Prefer': 'return=minimal' },
        body: JSON.stringify(payload),
      });
    }

    if (res.ok) {
      showToast(editId ? '更新しました ✓' : '登録しました ✓', 'success');
      setTimeout(() => { location.href = './panel_equipment_list.html'; }, 1200);
    } else {
      const err = await res.json();
      console.error(err);
      showToast('保存に失敗しました', 'error');
      btn.disabled = false;
      btn.innerHTML = `<i class="fa-solid fa-floppy-disk"></i> ${editId ? '更新する' : '登録する'}`;
    }
  } catch(e) {
    console.error(e);
    showToast('通信エラーが発生しました', 'error');
    btn.disabled = false;
    btn.innerHTML = `<i class="fa-solid fa-floppy-disk"></i> ${editId ? '更新する' : '登録する'}`;
  }
}

// ============================================================
// 削除（論理削除）
// ============================================================
function confirmDelete() {
  document.getElementById('del-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDelModal() {
  document.getElementById('del-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function closeDelOutside(e) {
  if (e.target === document.getElementById('del-overlay')) closeDelModal();
}

async function execDelete() {
  closeDelModal();
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/instruments?id=eq.${editId}`, {
      method: 'PATCH',
      headers: { ...SB_H.headers, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ is_active: false }),
    });
    if (res.ok) {
      showToast('削除しました', 'success');
      setTimeout(() => { location.href = './panel_equipment_list.html'; }, 1200);
    } else {
      showToast('削除に失敗しました', 'error');
    }
  } catch(e) {
    showToast('通信エラーが発生しました', 'error');
  }
}

// ============================================================
// トースト
// ============================================================
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = type ? `show ${type}` : 'show';
  setTimeout(() => { t.className = type; }, 3000);
}
</script>
