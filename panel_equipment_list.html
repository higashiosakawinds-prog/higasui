<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楽器一覧 | 楽器管理委員会</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Shippori+Mincho:wght@400;700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --blue:#214A9A;--navy:#1C2B4A;--gold:#C8A44D;
  --white:#fff;--bg:#F7F8FA;--text:#1A1A1A;--muted:#606070;--border:#DDE1EC;
  --green:#1D9E75;--red:#C0392B;--orange:#E67E22;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;}

/* ===== NAV ===== */
#site-nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;height:56px;
  background:rgba(28,43,74,0.97);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(200,164,77,0.25);display:none;
}
.nav-inner{height:100%;display:flex;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto;padding:0 1.5rem;}
#nav-logo{font-family:'Shippori Mincho',serif;color:#fff;font-size:1rem;font-weight:700;text-decoration:none;}
#nav-logo small{display:block;font-family:'Outfit',sans-serif;font-size:0.55rem;color:rgba(255,255,255,0.35);letter-spacing:.14em;font-weight:400;}
.nav-badge{font-family:'Outfit',sans-serif;font-size:0.58rem;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;background:rgba(200,164,77,0.15);color:var(--gold);padding:4px 10px;border-radius:20px;border:1px solid rgba(200,164,77,0.3);}
.nav-back{background:none;border:none;cursor:pointer;font-size:0.75rem;color:rgba(255,255,255,0.4);font-family:inherit;padding:6px 10px;border-radius:8px;transition:color 0.2s;text-decoration:none;}
.nav-back:hover{color:rgba(255,255,255,0.8);}

/* ===== MAIN ===== */
#panel-main{display:none;padding-top:56px;}

.page-header{background:linear-gradient(160deg,var(--navy) 0%,#0d1b35 100%);position:relative;overflow:hidden;}
.page-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 20%,rgba(200,164,77,0.15) 0%,transparent 55%),radial-gradient(ellipse at 10% 90%,rgba(200,164,77,0.08) 0%,transparent 50%);}
.page-header-inner{position:relative;z-index:1;padding:2.5rem 1.5rem 3rem;max-width:1100px;margin:0 auto;}
.page-eyebrow{font-family:'Outfit',sans-serif;font-size:0.65rem;font-weight:800;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:8px;margin-bottom:0.8rem;}
.page-eyebrow::before{content:'';width:16px;height:1.5px;background:var(--gold);}
.page-header h1{font-family:'Shippori Mincho',serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;color:white;line-height:1.3;margin-bottom:0.5rem;}
.page-header p{font-size:0.85rem;color:rgba(255,255,255,0.6);line-height:1.8;}

.inner{max-width:1100px;margin:0 auto;padding:0 1.5rem;width:100%;}
.sec{padding:32px 0;}

/* ===== QRスキャン着地バナー ===== */
#qr-landing{
  background:linear-gradient(135deg,var(--navy),#1a3d8a);
  border-radius:16px;padding:1.4rem 1.6rem;margin-bottom:24px;
  display:none;align-items:center;gap:16px;
}
#qr-landing .qr-icon{font-size:2rem;flex-shrink:0;}
#qr-landing .qr-text{color:white;}
#qr-landing .qr-text strong{display:block;font-size:1.05rem;margin-bottom:2px;}
#qr-landing .qr-text span{font-size:0.8rem;opacity:0.7;}

/* ===== フィルターパネル ===== */
.filter-panel{
  background:var(--white);border:1.5px solid var(--border);border-radius:16px;
  padding:1.4rem;margin-bottom:20px;
}
.filter-grid{
  display:grid;grid-template-columns:2fr repeat(3,1fr);gap:12px;
  align-items:end;
}
@media(max-width:700px){.filter-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:480px){.filter-grid{grid-template-columns:1fr;}}
.filter-group label{display:block;font-size:0.7rem;font-weight:700;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px;}
.filter-input,.filter-select{
  width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;
  font-size:0.85rem;font-family:inherit;color:var(--text);background:var(--bg);
  outline:none;transition:border-color 0.2s;
}
.filter-input:focus,.filter-select:focus{border-color:var(--blue);}
.filter-count{font-size:0.78rem;color:var(--muted);margin-top:10px;}
.filter-count strong{color:var(--navy);font-family:'Outfit',sans-serif;}

/* ===== 一覧テーブル ===== */
.list-wrap{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.inst-table{width:100%;border-collapse:collapse;font-size:0.83rem;}
.inst-table th{
  padding:10px 14px;text-align:left;font-size:0.68rem;font-weight:700;
  color:var(--muted);border-bottom:2px solid var(--border);letter-spacing:0.05em;
  white-space:nowrap;cursor:pointer;user-select:none;transition:color 0.15s;
}
.inst-table th:hover{color:var(--blue);}
.inst-table th .sort-icon{margin-left:4px;opacity:0.4;font-size:0.6rem;}
.inst-table th.sorted .sort-icon{opacity:1;color:var(--blue);}
.inst-table td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.inst-table tr:last-child td{border-bottom:none;}
.inst-table tr:hover td{background:#f5f7fb;}
.inst-table tr.highlight td{background:rgba(33,74,154,0.04);}

.inst-no{font-family:'Outfit',sans-serif;font-weight:800;font-size:0.85rem;color:var(--navy);}
.inst-name{font-weight:600;}

.cond-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.68rem;font-weight:700;white-space:nowrap;}
.cond-good{background:rgba(29,158,117,0.1);color:var(--green);}
.cond-needs{background:rgba(230,126,34,0.12);color:var(--orange);}
.cond-repair{background:rgba(192,57,43,0.1);color:var(--red);}
.cond-loaned{background:rgba(33,74,154,0.1);color:var(--blue);}

.owner-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:0.65rem;font-weight:700;}
.owner-own{background:rgba(29,158,117,0.1);color:var(--green);}
.owner-borrowed{background:rgba(200,164,77,0.15);color:#92680a;}

.empty-row td{text-align:center;padding:3rem;color:var(--muted);}
.empty-icon{font-size:1.8rem;display:block;margin-bottom:8px;opacity:0.3;}

/* 詳細モーダル */
#modal-overlay{
  position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.5);
  display:none;align-items:center;justify-content:center;padding:1rem;
  backdrop-filter:blur(4px);
}
#modal-overlay.open{display:flex;}
.modal-card{
  background:var(--white);border-radius:20px;width:100%;max-width:520px;
  max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,0.2);
}
.modal-header{
  padding:1.4rem 1.6rem 1rem;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  position:sticky;top:0;background:var(--white);z-index:1;
}
.modal-no{font-family:'Outfit',sans-serif;font-size:0.72rem;font-weight:800;color:var(--muted);letter-spacing:0.1em;margin-bottom:4px;}
.modal-title{font-family:'Shippori Mincho',serif;font-size:1.2rem;font-weight:700;color:var(--navy);}
.modal-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.1rem;padding:4px;flex-shrink:0;transition:color 0.15s;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:1.4rem 1.6rem;}
.modal-row{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:0.83rem;}
.modal-row:last-child{border-bottom:none;}
.modal-label{color:var(--muted);font-size:0.72rem;font-weight:700;width:100px;flex-shrink:0;padding-top:2px;}
.modal-val{color:var(--text);flex:1;line-height:1.6;}
.modal-footer{padding:1rem 1.6rem;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.btn{padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-size:0.83rem;font-weight:700;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s;}
.btn-primary{background:linear-gradient(135deg,var(--blue),#1a3d8a);color:white;}
.btn-primary:hover{transform:translateY(-1px);}
.btn-secondary{background:var(--white);color:var(--navy);border:1.5px solid var(--border);}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue);}

footer{background:var(--navy);padding:24px 0;text-align:center;margin-top:40px;}
footer p{font-family:'Outfit',sans-serif;font-size:0.68rem;color:rgba(255,255,255,0.3);letter-spacing:.06em;}
</style>
</head>
<body>

<!-- ===== NAV ===== -->
<nav id="site-nav">
  <div class="nav-inner">
    <a id="nav-logo" href="./member.html">東大阪吹奏楽団<small>HIGASUI WINDS</small></a>
    <span class="nav-badge">EQUIPMENT</span>
    <a class="nav-back" href="./panel_equipment.html"><i class="fa-solid fa-chevron-left"></i> 戻る</a>
  </div>
</nav>

<!-- ===== MAIN ===== -->
<div id="panel-main">
  <div class="page-header">
    <div class="page-header-inner">
      <div class="page-eyebrow"><span>EQUIPMENT / LIST</span></div>
      <h1>楽器一覧</h1>
      <p>登録された全楽器の検索・絞り込み・状態確認</p>
    </div>
  </div>

  <div class="sec">
    <div class="inner">

      <!-- QRスキャン着地バナー -->
      <div id="qr-landing">
        <div class="qr-icon">📷</div>
        <div class="qr-text">
          <strong id="qr-landing-no">QRコードから開きました</strong>
          <span>該当楽器にスクロールします</span>
        </div>
      </div>

      <!-- フィルター -->
      <div class="filter-panel">
        <div class="filter-grid">
          <div class="filter-group">
            <label>キーワード・保管場所</label>
            <input class="filter-input" type="text" id="fKeyword" placeholder="楽器名・管理番号・保管場所で検索…" oninput="applyFilter()">
          </div>
          <div class="filter-group">
            <label>カテゴリ</label>
            <select class="filter-select" id="fCategory" onchange="applyFilter()">
              <option value="">すべて</option>
              <option value="FL">FL フルート</option>
              <option value="OB">OB オーボエ</option>
              <option value="CL">CL クラリネット</option>
              <option value="BS">BS バスーン</option>
              <option value="SX">SX サックス</option>
              <option value="HR">HR ホルン</option>
              <option value="TP">TP トランペット</option>
              <option value="TB">TB トロンボーン</option>
              <option value="EU">EU ユーフォニアム</option>
              <option value="TU">TU チューバ</option>
              <option value="CB">CB コントラバス</option>
              <option value="PERC">PERC 打楽器</option>
              <option value="EQ">EQ その他備品</option>
            </select>
          </div>
          <div class="filter-group">
            <label>所有者</label>
            <select class="filter-select" id="fOwner" onchange="applyFilter()">
              <option value="">すべて</option>
              <option value="own">団所有</option>
              <option value="borrowed">借用</option>
            </select>
          </div>
          <div class="filter-group">
            <label>状態</label>
            <select class="filter-select" id="fCondition" onchange="applyFilter()">
              <option value="">すべて</option>
              <option value="good">良好</option>
              <option value="loaned">貸出中</option>
              <option value="needs_repair">要修繕</option>
              <option value="in_repair">修理中</option>
            </select>
          </div>
        </div>
        <div class="filter-count" id="filterCount"></div>
      </div>

      <!-- 一覧テーブル -->
      <div class="list-wrap">
        <div style="overflow-x:auto;">
          <table class="inst-table">
            <thead>
              <tr>
                <th onclick="sortBy('instrument_no')">管理番号 <span class="sort-icon" id="sort-instrument_no">▼</span></th>
                <th onclick="sortBy('name')">楽器名 <span class="sort-icon" id="sort-name">▼</span></th>
                <th>所有者</th>
                <th onclick="sortBy('condition')">状態 <span class="sort-icon" id="sort-condition">▼</span></th>
                <th>保管場所</th>
                <th>備考</th>
              </tr>
            </thead>
            <tbody id="instTableBody">
              <tr class="empty-row"><td colspan="6"><span class="empty-icon">🎺</span>読み込み中…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ===== 詳細モーダル ===== -->
<div id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal-card">
    <div class="modal-header">
      <div>
        <div class="modal-no" id="modal-no"></div>
        <div class="modal-title" id="modal-name"></div>
      </div>
      <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <a class="btn btn-secondary" id="modal-edit-link" href="#">
        <i class="fa-solid fa-pen"></i> 編集
      </a>
      <button class="btn btn-primary" onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>

<footer><p>© 東大阪吹奏楽団 楽器管理委員会 | EQUIPMENT COMMITTEE PANEL</p></footer>

<script>
// ============================================================
// 設定
// ============================================================
const SUPABASE_URL = 'https://eqnacealnnmpipapdguc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxbmFjZWFsbm5tcGlwYXBkZ3VjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzI4MjgsImV4cCI6MjA4OTQwODgyOH0.XI948sgJf6gWXs-sU9iiqxBXDB_S50ZBz__IeV1hA-0';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function makeSB(token) {
  return {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
    }
  };
}

const FULL_ACCESS = ['president', 'vice_president', 'director'];
function hasEquipmentAccess(member) {
  return FULL_ACCESS.includes(member.role || '') || (member.committee || '') === 'equipment';
}

// ============================================================
// 状態
// ============================================================
let allInstruments = [];
let activeLoanMap  = {};
let sortKey        = 'instrument_no';
let sortAsc        = true;
let SB_H           = null;

// ============================================================
// 初期化：セッション確認
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    location.href = './panel_equipment.html';
    return;
  }

  try {
    SB_H = makeSB(session.access_token);
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/members?email=eq.${encodeURIComponent(session.user.email)}&limit=1`,
      SB_H
    );
    const members = await res.json();
    if (!members || members.length === 0 || !hasEquipmentAccess(members[0])) {
      location.href = './panel_equipment.html';
      return;
    }
  } catch(e) {
    console.error(e);
    location.href = './panel_equipment.html';
    return;
  }

  // 権限OK → パネル表示
  document.getElementById('site-nav').style.display   = 'block';
  document.getElementById('panel-main').style.display = 'block';
  checkQrParam();
  loadData();
});

// ============================================================
// QRパラメータチェック
// ============================================================
function checkQrParam() {
  const params = new URLSearchParams(location.search);
  const no = params.get('no');
  if (!no) return;
  const banner = document.getElementById('qr-landing');
  document.getElementById('qr-landing-no').textContent = `${no} の情報`;
  banner.style.display = 'flex';
  window._qrTargetNo = no;
}

// ============================================================
// データ読み込み
// ============================================================
async function loadData() {
  try {
    const [instRes, loanRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/instruments?is_active=eq.true&select=*&order=instrument_no.asc`, SB_H),
      fetch(`${SUPABASE_URL}/rest/v1/instrument_loans?returned_at=is.null&select=instrument_id,borrower_type,borrower_name,borrower_member_id,loaned_from,loaned_until`, SB_H),
    ]);
    allInstruments = await instRes.json() || [];
    const loans    = await loanRes.json() || [];

    activeLoanMap = {};
    loans.forEach(l => { activeLoanMap[l.instrument_id] = l; });

    applyFilter();

    if (window._qrTargetNo) {
      const target = allInstruments.find(i => i.instrument_no === window._qrTargetNo);
      if (target) {
        setTimeout(() => openModal(target.id), 400);
      }
    }
  } catch(e) {
    console.error('データ取得エラー:', e);
    document.getElementById('instTableBody').innerHTML =
      '<tr class="empty-row"><td colspan="6"><span class="empty-icon">⚠️</span>データを取得できませんでした</td></tr>';
  }
}

// ============================================================
// フィルター＆ソート
// ============================================================
function applyFilter() {
  const keyword   = document.getElementById('fKeyword').value.trim().toLowerCase();
  const category  = document.getElementById('fCategory').value;
  const owner     = document.getElementById('fOwner').value;
  const condition = document.getElementById('fCondition').value;

  let filtered = allInstruments.filter(inst => {
    if (keyword) {
      const hay = `${inst.instrument_no} ${inst.name} ${inst.location || ''}`.toLowerCase();
      if (!hay.includes(keyword)) return false;
    }
    if (category) {
      if (!inst.instrument_no.startsWith(category + '-')) return false;
    }
    if (owner && inst.owner_type !== owner) return false;
    if (condition) {
      const isLoaned = !!activeLoanMap[inst.id];
      if (condition === 'loaned' && !isLoaned) return false;
      if (condition !== 'loaned' && inst.condition !== condition) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    let av = a[sortKey] || '';
    let bv = b[sortKey] || '';
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ? 1 : -1;
    return 0;
  });

  renderTable(filtered);
  document.getElementById('filterCount').innerHTML =
    `<strong>${filtered.length}</strong> 件表示（全 ${allInstruments.length} 件）`;
}

function sortBy(key) {
  if (sortKey === key) {
    sortAsc = !sortAsc;
  } else {
    sortKey = key;
    sortAsc = true;
  }
  document.querySelectorAll('.inst-table th').forEach(th => th.classList.remove('sorted'));
  const icon = document.getElementById('sort-' + key);
  if (icon) {
    icon.closest('th').classList.add('sorted');
    icon.textContent = sortAsc ? '▲' : '▼';
  }
  applyFilter();
}

// ============================================================
// テーブル描画
// ============================================================
const COND_LABEL = { good:'良好', needs_repair:'要修繕', in_repair:'修理中' };
const COND_CLASS = { good:'cond-good', needs_repair:'cond-needs', in_repair:'cond-repair' };

function renderTable(list) {
  if (!list.length) {
    document.getElementById('instTableBody').innerHTML =
      '<tr class="empty-row"><td colspan="6"><span class="empty-icon">🔍</span>条件に一致する楽器がありません</td></tr>';
    return;
  }

  const rows = list.map(inst => {
    const isLoaned  = !!activeLoanMap[inst.id];
    const condLabel = isLoaned ? '貸出中' : (COND_LABEL[inst.condition] || inst.condition);
    const condClass = isLoaned ? 'cond-loaned' : (COND_CLASS[inst.condition] || 'cond-good');
    const ownerLabel = inst.owner_type === 'own' ? '団所有' : `借用${inst.owner_name ? '：' + inst.owner_name : ''}`;
    const ownerClass = inst.owner_type === 'own' ? 'owner-own' : 'owner-borrowed';
    const isTarget  = window._qrTargetNo && inst.instrument_no === window._qrTargetNo;

    return `<tr class="${isTarget ? 'highlight' : ''}" id="row-${inst.id}" style="cursor:pointer;" onclick="openModal('${inst.id}')">
      <td><span class="inst-no">${inst.instrument_no}</span></td>
      <td><span class="inst-name">${inst.name}</span></td>
      <td><span class="owner-badge ${ownerClass}">${ownerLabel}</span></td>
      <td><span class="cond-badge ${condClass}">${condLabel}</span></td>
      <td style="font-size:0.78rem;color:var(--muted);">${inst.location || '—'}</td>
      <td style="font-size:0.78rem;color:var(--muted);max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${inst.note || '—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('instTableBody').innerHTML = rows;

  if (window._qrTargetNo) {
    const target = list.find(i => i.instrument_no === window._qrTargetNo);
    if (target) {
      setTimeout(() => {
        const row = document.getElementById('row-' + target.id);
        if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    }
  }
}

// ============================================================
// 詳細モーダル
// ============================================================
function openModal(id) {
  const inst = allInstruments.find(i => i.id === id);
  if (!inst) return;

  const loan = activeLoanMap[inst.id];
  const isLoaned = !!loan;
  const condLabel = isLoaned ? '貸出中' : (COND_LABEL[inst.condition] || inst.condition);
  const condClass = isLoaned ? 'cond-loaned' : (COND_CLASS[inst.condition] || 'cond-good');

  document.getElementById('modal-no').textContent   = inst.instrument_no;
  document.getElementById('modal-name').textContent = inst.name;
  document.getElementById('modal-edit-link').href   =
    `./panel_equipment_register.html?id=${inst.id}`;

  let loanHtml = '';
  if (isLoaned) {
    const borrower = loan.borrower_type === 'member' ? '団員' : (loan.borrower_name || '外部');
    const from  = loan.loaned_from  ? loan.loaned_from.slice(0,10) : '—';
    const until = loan.loaned_until ? loan.loaned_until.slice(0,10) : '期限なし';
    loanHtml = `
      <div class="modal-row">
        <div class="modal-label">貸出先</div>
        <div class="modal-val">${borrower}</div>
      </div>
      <div class="modal-row">
        <div class="modal-label">貸出期間</div>
        <div class="modal-val">${from} 〜 ${until}</div>
      </div>`;
  }

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-row">
      <div class="modal-label">状態</div>
      <div class="modal-val"><span class="cond-badge ${condClass}">${condLabel}</span></div>
    </div>
    <div class="modal-row">
      <div class="modal-label">所有者</div>
      <div class="modal-val">${inst.owner_type === 'own' ? '団所有' : `借用：${inst.owner_name || '—'}`}</div>
    </div>
    <div class="modal-row">
      <div class="modal-label">保管場所</div>
      <div class="modal-val">${inst.location || '—'}</div>
    </div>
    <div class="modal-row">
      <div class="modal-label">取得日</div>
      <div class="modal-val">${inst.acquired_date ? inst.acquired_date.slice(0,10) : '—'}</div>
    </div>
    ${loanHtml}
    <div class="modal-row">
      <div class="modal-label">状態メモ</div>
      <div class="modal-val">${inst.condition_note || '—'}</div>
    </div>
    ${inst.repair_return_due ? `
    <div class="modal-row">
      <div class="modal-label">修繕返却予定</div>
      <div class="modal-val">${inst.repair_return_due.slice(0,10)}</div>
    </div>` : ''}
    <div class="modal-row">
      <div class="modal-label">備考</div>
      <div class="modal-val">${inst.note || '—'}</div>
    </div>
  `;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
</script>
